<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>דשבורד — עכשיו באות!</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Assistant', sans-serif;
      background: #f5f6fa;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ── Login screen ────────────────────────────── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .login-box {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .login-box h1 {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: .25rem;
      color: #2d4a8a;
    }

    .login-box p {
      color: #666;
      margin-bottom: 1.5rem;
      font-size: .95rem;
    }

    .login-box input {
      display: block;
      width: 100%;
      padding: .65rem .9rem;
      margin-bottom: .75rem;
      border: 1.5px solid #dde;
      border-radius: 8px;
      font: inherit;
      font-size: .95rem;
      direction: ltr;
      text-align: left;
    }

    .login-box input:focus {
      outline: none;
      border-color: #2d4a8a;
    }

    .login-box button {
      width: 100%;
      padding: .7rem;
      background: #2d4a8a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: .25rem;
    }

    .login-box button:hover { background: #1e3670; }

    .login-error {
      color: #c0392b;
      font-size: .85rem;
      margin-top: .75rem;
      min-height: 1.2em;
    }

    /* ── Dashboard ───────────────────────────────── */
    #dashboard { display: none; }

    .dash-header {
      background: #2d4a8a;
      color: #fff;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .dash-header h1 {
      font-size: 1.25rem;
      font-weight: 800;
    }

    .dash-header button {
      background: rgba(255,255,255,.15);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: .4rem 1rem;
      font: inherit;
      font-size: .85rem;
      cursor: pointer;
    }

    .dash-header button:hover { background: rgba(255,255,255,.25); }

    .dash-body {
      max-width: 1000px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    /* ── Stats row ───────────────────────────────── */
    .stats-row {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .stat-card {
      flex: 1;
      min-width: 140px;
      background: #fff;
      border-radius: 10px;
      padding: 1.25rem;
      box-shadow: 0 2px 12px rgba(0,0,0,.05);
      text-align: center;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 800;
      color: #2d4a8a;
    }

    .stat-label {
      font-size: .85rem;
      color: #666;
      margin-top: .15rem;
    }

    /* ── Date filter ─────────────────────────────── */
    .filter-row {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      font-size: .9rem;
    }

    .filter-row label { font-weight: 600; }

    .filter-row input[type="date"] {
      padding: .4rem .6rem;
      border: 1.5px solid #dde;
      border-radius: 6px;
      font: inherit;
      direction: ltr;
    }

    .filter-row button {
      padding: .4rem 1rem;
      background: #2d4a8a;
      color: #fff;
      border: none;
      border-radius: 6px;
      font: inherit;
      cursor: pointer;
    }

    /* ── Chart card ──────────────────────────────── */
    .chart-card {
      background: #fff;
      border-radius: 10px;
      padding: 1.5rem;
      box-shadow: 0 2px 12px rgba(0,0,0,.05);
      margin-bottom: 1.5rem;
    }

    .chart-card h2 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: #333;
    }

    /* ── Table ────────────────────────────────────── */
    .ref-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .9rem;
    }

    .ref-table th {
      text-align: right;
      padding: .6rem .75rem;
      background: #f0f2f8;
      font-weight: 700;
      border-bottom: 2px solid #dde;
    }

    .ref-table td {
      padding: .55rem .75rem;
      border-bottom: 1px solid #eee;
    }

    .ref-table tr:hover td { background: #f8f9fd; }

    .conv-good { color: #27ae60; font-weight: 700; }
    .conv-mid  { color: #f39c12; font-weight: 700; }
    .conv-low  { color: #c0392b; font-weight: 700; }

    .loading-msg {
      text-align: center;
      padding: 3rem;
      color: #999;
      font-size: 1.1rem;
    }

    @media (max-width: 600px) {
      .dash-body { padding: 1rem; }
      .stat-card { min-width: 100px; padding: 1rem; }
      .stat-value { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- ═══════════ LOGIN ═══════════ -->
  <div id="login-screen">
    <div class="login-box">
      <h1>דשבורד עכשיו באות!</h1>
      <p>כניסת מנהלים</p>
      <button id="login-btn">כניסה עם Google</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <!-- ═══════════ DASHBOARD ═══════════ -->
  <div id="dashboard">
    <div class="dash-header">
      <h1>דשבורד — עכשיו באות!</h1>
      <button id="logout-btn">יציאה</button>
    </div>

    <div class="dash-body">
      <!-- Date filter -->
      <div class="filter-row">
        <label>מתאריך:</label>
        <input type="date" id="filter-from" />
        <label>עד:</label>
        <input type="date" id="filter-to" />
        <button id="filter-btn">סנן</button>
      </div>

      <!-- Summary stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-value" id="stat-visits">—</div>
          <div class="stat-label">ביקורים (עם referrer)</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-signups">—</div>
          <div class="stat-label">הרשמות</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-conv">—</div>
          <div class="stat-label">אחוז המרה</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-bounce">—</div>
          <div class="stat-label">נטשו לפני שליחה</div>
        </div>
      </div>

      <!-- Chart -->
      <div class="chart-card">
        <h2>ביקורים מול הרשמות לפי מפנה</h2>
        <canvas id="refChart" height="300"></canvas>
      </div>

      <!-- Daily trend -->
      <div class="chart-card">
        <h2>מגמה יומית</h2>
        <canvas id="dailyChart" height="200"></canvas>
      </div>

      <!-- Table -->
      <div class="chart-card">
        <h2>פירוט לפי מפנה</h2>
        <div id="table-wrap">
          <p class="loading-msg">טוען נתונים…</p>
        </div>
      </div>
    </div>
  </div>

  <script>
  // ── Replace with YOUR config from the Firebase console ──────────
  const firebaseConfig = {
    apiKey:            "AIzaSyC7hQs04G8U0BMs9UXrHEurQnxgxN7jmLw",
    authDomain:        "hagush-org-il.firebaseapp.com",
    projectId:         "hagush-org-il",
    storageBucket:     "hagush-org-il.firebasestorage.app",
    messagingSenderId: "674306617225",
    appId:             "1:674306617225:web:7f84e8f09bc35222e77b58",
  };
  // ─────────────────────────────────────────────────────────────────

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db   = firebase.firestore();

  // ── Auth ──────────────────────────────────────────────────────
  const loginScreen = document.getElementById("login-screen");
  const dashboard   = document.getElementById("dashboard");
  const loginBtn    = document.getElementById("login-btn");
  const logoutBtn   = document.getElementById("logout-btn");
  const loginError  = document.getElementById("login-error");

  loginBtn.addEventListener("click", async () => {
    loginError.textContent = "";
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      await auth.signInWithPopup(provider);
    } catch (err) {
      loginError.textContent = "שגיאה בכניסה. נסי/נסה שוב.";
    }
  });

  logoutBtn.addEventListener("click", () => auth.signOut());

  auth.onAuthStateChanged((user) => {
    if (user) {
      loginScreen.style.display = "none";
      dashboard.style.display   = "block";
      loadData();
    } else {
      loginScreen.style.display = "flex";
      dashboard.style.display   = "none";
    }
  });

  // ── Data loading ──────────────────────────────────────────────
  let allEvents = [];
  let refChart  = null;
  let dailyChart = null;

  async function loadData() {
    const snap = await db.collection("events")
      .orderBy("timestamp", "desc")
      .get();

    allEvents = snap.docs.map((d) => {
      const data = d.data();
      return {
        type:      data.type,
        referrer:  data.referrer || "(ישיר)",
        timestamp: data.timestamp ? data.timestamp.toDate() : new Date(),
        email:     data.email || null,
      };
    });

    renderAll(allEvents);
  }

  // ── Date filter ───────────────────────────────────────────────
  document.getElementById("filter-btn").addEventListener("click", () => {
    const from = document.getElementById("filter-from").value;
    const to   = document.getElementById("filter-to").value;

    let filtered = allEvents;
    if (from) {
      const d = new Date(from);
      filtered = filtered.filter((e) => e.timestamp >= d);
    }
    if (to) {
      const d = new Date(to);
      d.setDate(d.getDate() + 1); // include the end date
      filtered = filtered.filter((e) => e.timestamp < d);
    }
    renderAll(filtered);
  });

  // ── Render everything ─────────────────────────────────────────
  function renderAll(events) {
    const visits  = events.filter((e) => e.type === "visit");
    const signups = events.filter((e) => e.type === "signup");

    // Stats
    const totalVisits  = visits.length;
    const totalSignups = signups.length;
    const convRate     = totalVisits > 0 ? ((totalSignups / totalVisits) * 100).toFixed(1) : "0";
    const bounced      = totalVisits - totalSignups;

    document.getElementById("stat-visits").textContent  = totalVisits;
    document.getElementById("stat-signups").textContent  = totalSignups;
    document.getElementById("stat-conv").textContent     = convRate + "%";
    document.getElementById("stat-bounce").textContent   = bounced;

    // ── Per-referrer aggregation ────────────────────────────────
    const refMap = {};
    visits.forEach((e) => {
      if (!refMap[e.referrer]) refMap[e.referrer] = { visits: 0, signups: 0 };
      refMap[e.referrer].visits++;
    });
    signups.forEach((e) => {
      if (!refMap[e.referrer]) refMap[e.referrer] = { visits: 0, signups: 0 };
      refMap[e.referrer].signups++;
    });

    const referrers = Object.entries(refMap)
      .map(([name, d]) => ({ name, ...d, conv: d.visits > 0 ? (d.signups / d.visits * 100) : 0 }))
      .sort((a, b) => b.visits - a.visits);

    renderRefChart(referrers);
    renderTable(referrers);

    // ── Daily trend ─────────────────────────────────────────────
    const dayMap = {};
    events.forEach((e) => {
      const key = e.timestamp.toISOString().slice(0, 10);
      if (!dayMap[key]) dayMap[key] = { visits: 0, signups: 0 };
      dayMap[key][e.type === "signup" ? "signups" : "visits"]++;
    });

    const days = Object.entries(dayMap)
      .sort(([a], [b]) => a.localeCompare(b))
      .map(([date, d]) => ({ date, ...d }));

    renderDailyChart(days);
  }

  // ── Referrer bar chart ────────────────────────────────────────
  function renderRefChart(referrers) {
    const ctx = document.getElementById("refChart").getContext("2d");
    if (refChart) refChart.destroy();

    refChart = new Chart(ctx, {
      type: "bar",
      data: {
        labels: referrers.map((r) => r.name),
        datasets: [
          {
            label: "ביקורים",
            data: referrers.map((r) => r.visits),
            backgroundColor: "rgba(45,74,138,.6)",
          },
          {
            label: "הרשמות",
            data: referrers.map((r) => r.signups),
            backgroundColor: "rgba(39,174,96,.6)",
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { position: "top" } },
        scales: {
          y: { beginAtZero: true, ticks: { stepSize: 1 } },
        },
      },
    });
  }

  // ── Daily trend line chart ────────────────────────────────────
  function renderDailyChart(days) {
    const ctx = document.getElementById("dailyChart").getContext("2d");
    if (dailyChart) dailyChart.destroy();

    dailyChart = new Chart(ctx, {
      type: "line",
      data: {
        labels: days.map((d) => d.date),
        datasets: [
          {
            label: "ביקורים",
            data: days.map((d) => d.visits),
            borderColor: "#2d4a8a",
            backgroundColor: "rgba(45,74,138,.1)",
            fill: true,
            tension: .3,
          },
          {
            label: "הרשמות",
            data: days.map((d) => d.signups),
            borderColor: "#27ae60",
            backgroundColor: "rgba(39,174,96,.1)",
            fill: true,
            tension: .3,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { position: "top" } },
        scales: {
          y: { beginAtZero: true, ticks: { stepSize: 1 } },
        },
      },
    });
  }

  // ── Referrer table ────────────────────────────────────────────
  function renderTable(referrers) {
    const wrap = document.getElementById("table-wrap");

    if (referrers.length === 0) {
      wrap.innerHTML = '<p class="loading-msg">אין נתונים עדיין.</p>';
      return;
    }

    let html = '<table class="ref-table"><thead><tr>'
      + '<th>מפנה</th><th>ביקורים</th><th>הרשמות</th><th>נטשו</th><th>המרה</th>'
      + '</tr></thead><tbody>';

    referrers.forEach((r) => {
      const bounced = r.visits - r.signups;
      const convClass = r.conv >= 30 ? "conv-good" : r.conv >= 15 ? "conv-mid" : "conv-low";
      html += '<tr>'
        + '<td>' + esc(r.name) + '</td>'
        + '<td>' + r.visits + '</td>'
        + '<td>' + r.signups + '</td>'
        + '<td>' + bounced + '</td>'
        + '<td class="' + convClass + '">' + r.conv.toFixed(1) + '%</td>'
        + '</tr>';
    });

    html += '</tbody></table>';
    wrap.innerHTML = html;
  }

  function esc(s) {
    const d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }
  </script>
</body>
</html>
