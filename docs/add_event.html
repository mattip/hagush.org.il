<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>הוספת אירוע | עכשיו באות!</title>
  <link rel="icon" href="favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Open Sans', sans-serif;
      background: #f5f6fa;
      color: #1a1a2e;
      min-height: 100vh;
    }

    .top-bar {
      background: #09366d;
      color: #fff;
      padding: .8rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .top-bar h1 { font-size: 1.1rem; font-weight: 800; }
    .top-bar button {
      background: rgba(255,255,255,.15);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: .4rem 1rem;
      font: inherit;
      font-size: .85rem;
      cursor: pointer;
    }

    /* Login */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
    }
    .login-box {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 360px;
      width: 100%;
    }
    .login-box h2 { color: #09366d; margin-bottom: 1rem; }
    .login-box button {
      padding: .7rem 1.5rem;
      background: #09366d;
      color: #fff;
      border: none;
      border-radius: 8px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .login-error { color: #c0392b; font-size: .85rem; margin-top: .75rem; }

    /* Form */
    #admin-panel { display: none; max-width: 600px; margin: 1.5rem auto; padding: 0 1rem; }

    .form-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .form-card h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #09366d;
      margin-bottom: 1rem;
    }

    .field { margin-bottom: 1rem; }
    .field label {
      display: block;
      font-size: .85rem;
      font-weight: 600;
      color: #333;
      margin-bottom: .3rem;
    }
    .field input, .field select, .field textarea {
      width: 100%;
      padding: .55rem .75rem;
      border: 1.5px solid #dde;
      border-radius: 8px;
      font: inherit;
      font-size: .9rem;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      outline: none;
      border-color: #09366d;
    }
    .field textarea { resize: vertical; min-height: 60px; }
    .field .hint { font-size: .75rem; color: #999; margin-top: .2rem; }
    .field input[type="date"],
    .field input[type="time"] { direction: ltr; text-align: right; }

    .participants-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }
    .participant-tag {
      background: #eaeff6;
      color: #09366d;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: .8rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .participant-tag button {
      background: none;
      border: none;
      color: #c0392b;
      cursor: pointer;
      font-size: .9rem;
      padding: 0;
      line-height: 1;
    }
    .add-row {
      display: flex;
      gap: 6px;
    }
    .add-row input { flex: 1; }
    .add-row button {
      padding: .55rem .9rem;
      background: #09366d;
      color: #fff;
      border: none;
      border-radius: 8px;
      font: inherit;
      font-size: .85rem;
      cursor: pointer;
      white-space: nowrap;
    }

    .submit-btn {
      width: 100%;
      padding: .75rem;
      background: #e47f09;
      color: #fff;
      border: none;
      border-radius: 8px;
      font: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    .submit-btn:hover { filter: brightness(1.08); }
    .submit-btn:disabled { background: #999; cursor: default; }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: #27ae60;
      color: #fff;
      padding: .6rem 1.5rem;
      border-radius: 8px;
      font-weight: 600;
      display: none;
      z-index: 99;
    }

    /* Existing events list */
    .existing-events { margin-top: 1.5rem; }
    .existing-event {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: .6rem 0;
      border-bottom: 1px solid #eee;
      font-size: .85rem;
    }
    .existing-event .ev-info { color: #333; }
    .existing-event .ev-date { color: #7890a6; font-size: .8rem; }
    .existing-event button {
      background: none;
      border: none;
      color: #c0392b;
      cursor: pointer;
      font-size: .8rem;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <!-- Login -->
  <div id="login-screen">
    <div class="login-box">
      <h2>הוספת אירוע</h2>
      <p style="color:#666; margin-bottom:1rem; font-size:.9rem">כניסת מנהלים</p>
      <button id="login-btn">כניסה עם Google</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <!-- Admin panel -->
  <div id="admin-panel">
    <div class="top-bar">
      <h1>הוספת אירוע</h1>
      <button id="logout-btn">יציאה</button>
    </div>

    <div class="form-card" style="margin-top:1.5rem">
      <h2>אירוע חדש</h2>

      <div class="field">
        <label>תאריך *</label>
        <input type="date" id="evDate" required />
      </div>

      <div class="field">
        <label>שעה *</label>
        <input type="time" id="evTime" required />
      </div>

      <div class="field">
        <label>אזור *</label>
        <select id="evRegion">
          <option value="">בחרו אזור</option>
          <option value="צפון">צפון</option>
          <option value="חיפה">חיפה</option>
          <option value="מרכז">מרכז</option>
          <option value="תל אביב">תל אביב</option>
          <option value="ירושלים">ירושלים</option>
          <option value="דרום">דרום</option>
        </select>
      </div>

      <div class="field">
        <label>עיר/ישוב *</label>
        <input type="text" id="evCity" placeholder="חיפה" />
      </div>

      <div class="field">
        <label>כתובת / שם מקום</label>
        <input type="text" id="evAddress" placeholder="בני אפרים 32 | מרכז קהילתי" />
        <div class="hint">לא חובה</div>
      </div>

      <div class="field">
        <label>משתתפים *</label>
        <div class="add-row">
          <input type="text" id="evParticipantInput" placeholder="שם מועמד/ת" />
          <button type="button" id="addParticipant">הוסף</button>
        </div>
        <div class="participants-list" id="participantsList"></div>
      </div>

      <div class="field">
        <label>תאור</label>
        <textarea id="evDesc" maxlength="150" placeholder="כמה מילים על האירוע"></textarea>
        <div class="hint">עד 150 תווים</div>
      </div>

      <div class="field">
        <label>לינק לרישום</label>
        <input type="url" id="evLink" placeholder="https://..." dir="ltr" />
        <div class="hint">השאירו ריק אם אין צורך ברישום</div>
      </div>

      <button class="submit-btn" id="submitBtn">הוסף אירוע</button>
    </div>

    <!-- Existing events -->
    <div class="form-card">
      <h2>אירועים קיימים</h2>
      <div class="existing-events" id="existingEvents">
        <p style="color:#999">טוען…</p>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">האירוע נוסף בהצלחה!</div>

  <script>
  const firebaseConfig = {
    apiKey:            "AIzaSyC7hQs04G8U0BMs9UXrHEurQnxgxN7jmLw",
    authDomain:        "hagush-org-il.firebaseapp.com",
    projectId:         "hagush-org-il",
    storageBucket:     "hagush-org-il.firebasestorage.app",
    messagingSenderId: "674306617225",
    appId:             "1:674306617225:web:7f84e8f09bc35222e77b58",
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db   = firebase.firestore();

  // ── Auth ──
  const loginScreen = document.getElementById("login-screen");
  const adminPanel  = document.getElementById("admin-panel");

  document.getElementById("login-btn").addEventListener("click", async () => {
    try {
      await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    } catch (err) {
      document.getElementById("login-error").textContent = "שגיאה בכניסה";
    }
  });

  document.getElementById("logout-btn").addEventListener("click", () => auth.signOut());

  auth.onAuthStateChanged((user) => {
    if (user) {
      loginScreen.style.display = "none";
      adminPanel.style.display  = "block";
      loadExisting();
    } else {
      loginScreen.style.display = "flex";
      adminPanel.style.display  = "none";
    }
  });

  // ── Participants ──
  let participants = [];

  document.getElementById("addParticipant").addEventListener("click", addParticipant);
  document.getElementById("evParticipantInput").addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); addParticipant(); }
  });

  function addParticipant() {
    const input = document.getElementById("evParticipantInput");
    const name = input.value.trim();
    if (!name) return;
    participants.push(name);
    input.value = "";
    renderParticipants();
  }

  function removeParticipant(idx) {
    participants.splice(idx, 1);
    renderParticipants();
  }

  function renderParticipants() {
    const list = document.getElementById("participantsList");
    list.innerHTML = participants.map((p, i) =>
      `<span class="participant-tag">${esc(p)}<button onclick="removeParticipant(${i})">✕</button></span>`
    ).join("");
  }

  // ── Submit ──
  document.getElementById("submitBtn").addEventListener("click", async () => {
    const date = document.getElementById("evDate").value;
    const time = document.getElementById("evTime").value;
    const region = document.getElementById("evRegion").value;
    const city = document.getElementById("evCity").value.trim();

    if (!date || !time || !region || !city || participants.length === 0) {
      alert("נא למלא את כל שדות החובה (תאריך, שעה, אזור, עיר, משתתפים)");
      return;
    }

    const btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.textContent = "שומר…";

    try {
      await db.collection("campaign_events").add({
        date:              date,
        time:              time,
        region:            region,
        city:              city,
        address:           document.getElementById("evAddress").value.trim(),
        participants:      [...participants],
        description:       document.getElementById("evDesc").value.trim(),
        registration_link: document.getElementById("evLink").value.trim(),
        created_at:        firebase.firestore.FieldValue.serverTimestamp(),
        created_by:        auth.currentUser.email,
      });

      // Reset form
      document.getElementById("evDate").value = "";
      document.getElementById("evTime").value = "";
      document.getElementById("evRegion").value = "";
      document.getElementById("evCity").value = "";
      document.getElementById("evAddress").value = "";
      document.getElementById("evDesc").value = "";
      document.getElementById("evLink").value = "";
      participants = [];
      renderParticipants();

      // Toast
      const toast = document.getElementById("toast");
      toast.style.display = "block";
      setTimeout(() => toast.style.display = "none", 3000);

      loadExisting();
    } catch (err) {
      alert("שגיאה בשמירה: " + err.message);
    }

    btn.disabled = false;
    btn.textContent = "הוסף אירוע";
  });

  // ── Load existing events ──
  async function loadExisting() {
    const snap = await db.collection("campaign_events")
      .orderBy("date")
      .get();

    const wrap = document.getElementById("existingEvents");
    if (snap.empty) {
      wrap.innerHTML = '<p style="color:#999">אין אירועים</p>';
      return;
    }

    wrap.innerHTML = snap.docs.map(doc => {
      const ev = doc.data();
      const names = (ev.participants || []).join(", ");
      return `
        <div class="existing-event">
          <div>
            <span class="ev-info">${esc(names)}</span>
            <span class="ev-date">${esc(ev.date)} ${esc(ev.time)} — ${esc(ev.city || "")}</span>
          </div>
          <button onclick="deleteEvent('${doc.id}')">מחק</button>
        </div>
      `;
    }).join("");
  }

  async function deleteEvent(id) {
    if (!confirm("למחוק את האירוע?")) return;
    await db.collection("campaign_events").doc(id).delete();
    loadExisting();
  }

  function esc(s) {
    const d = document.createElement("div");
    d.textContent = s || "";
    return d.innerHTML;
  }
  </script>
</body>
</html>
