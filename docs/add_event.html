<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>הוספת אירוע | עכשיו באות!</title>
  <link rel="icon" href="favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/main.css?v=4" />
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Open Sans', sans-serif;
      background: #f5f6fa;
      color: #1a1a2e;
      min-height: 100vh;
    }

    .top-bar {
      background: #09366d;
      color: #fff;
      padding: .8rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .top-bar h1 { font-size: 1.1rem; font-weight: 800; }
    .top-bar button {
      background: rgba(255,255,255,.15);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: .4rem 1rem;
      font: inherit;
      font-size: .85rem;
      cursor: pointer;
    }

    /* Login */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
    }
    .login-box {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 360px;
      width: 100%;
    }
    .login-box h2 { color: #09366d; margin-bottom: 1rem; }
    .login-box button {
      padding: .7rem 1.5rem;
      background: #09366d;
      color: #fff;
      border: none;
      border-radius: 8px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .login-error { color: #c0392b; font-size: .8rem; margin-top: .75rem; word-break: break-word; }

    /* Form */
    #admin-panel { display: none; max-width: 600px; margin: 1.5rem auto; padding: 0 1rem; }

    .form-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .form-card h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #09366d;
      margin-bottom: 1rem;
    }

    .field { margin-bottom: 1rem; }
    .field label {
      display: block;
      font-size: .85rem;
      font-weight: 600;
      color: #333;
      margin-bottom: .3rem;
    }
    .field input, .field select, .field textarea {
      width: 100%;
      padding: .55rem .75rem;
      border: 1.5px solid #dde;
      border-radius: 8px;
      font: inherit;
      font-size: .9rem;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      outline: none;
      border-color: #09366d;
    }
    .field textarea { resize: vertical; min-height: 60px; }
    .field .hint { font-size: .75rem; color: #999; margin-top: .2rem; }
    .field input[type="date"],
    .field input[type="time"] { direction: ltr; text-align: right; }

    .participants-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }
    .participant-tag {
      background: #eaeff6;
      color: #09366d;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: .8rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .participant-tag button {
      background: none;
      border: none;
      color: #c0392b;
      cursor: pointer;
      font-size: .9rem;
      padding: 0;
      line-height: 1;
    }

    /* Region radio buttons */
    .region-radios {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }
    .region-radio {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 12px;
      border: 1.5px solid #dde;
      border-radius: 999px;
      font-size: .85rem;
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    .region-radio:has(input:checked) {
      background: #eaeff6;
      border-color: #09366d;
    }
    .region-radio input { margin: 0; }

    /* Participants dropdown */
    .participants-dropdown { position: relative; }
    .pd-toggle {
      width: 100%;
      padding: .55rem .75rem;
      border: 1.5px solid #dde;
      border-radius: 8px;
      font: inherit;
      font-size: .9rem;
      background: #fff;
      color: #333;
      text-align: right;
      cursor: pointer;
    }
    .pd-toggle:hover { border-color: #09366d; }
    .pd-menu {
      position: absolute;
      top: 100%;
      right: 0;
      left: 0;
      background: #fff;
      border: 1.5px solid #dde;
      border-radius: 0 0 8px 8px;
      border-top: none;
      max-height: 240px;
      overflow-y: auto;
      z-index: 20;
      box-shadow: 0 4px 12px rgba(0,0,0,.1);
    }
    .pd-list { padding: 4px 0; }
    .pd-item {
      display: block;
      padding: 8px 12px 8px 40px;
      font-size: .85rem;
      cursor: pointer;
      position: relative;
    }
    .pd-item:hover { background: #f5f6fa; }
    .pd-item.pd-preferred { font-weight: 700; background: #f0f4ff; }
    .pd-item input {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      margin: 0;
    }
    .pd-search {
      width: 100%;
      padding: 8px 12px;
      border: none;
      border-bottom: 1px solid #eee;
      font: inherit;
      font-size: .85rem;
      outline: none;
    }
    .pd-search::placeholder { color: #bbb; }
    .pd-other {
      border-top: 1px solid #eee;
      padding: 8px;
    }
    .pd-other .add-row { display: flex; gap: 6px; }
    .pd-other .add-row input { flex: 1; padding: .4rem .6rem; border: 1.5px solid #dde; border-radius: 6px; font: inherit; font-size: .85rem; }
    .pd-other .add-row button { padding: .4rem .8rem; background: #09366d; color: #fff; border: none; border-radius: 6px; font: inherit; font-size: .8rem; cursor: pointer; white-space: nowrap; }

    .btn-row {
      display: flex;
      gap: 8px;
    }
    .submit-btn {
      flex: 6;
      padding: .75rem;
      background: #e47f09;
      color: #fff;
      border: none;
      border-radius: 8px;
      font: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    .submit-btn:hover { filter: brightness(1.08); }
    .submit-btn:disabled { background: #999; cursor: default; }
    .cancel-btn {
      flex: 4;
      padding: .75rem 1.5rem;
      background: #e0e3e8;
      border: none;
      border-radius: 8px;
      font: inherit;
      font-size: .9rem;
      color: #444;
      cursor: pointer;
      font-weight: 600;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: #27ae60;
      color: #fff;
      padding: .6rem 1.5rem;
      border-radius: 8px;
      font-weight: 600;
      display: none;
      z-index: 99;
    }

    /* Existing events list */
    .existing-events { margin-top: 1.5rem; }
    .existing-event {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: .6rem 0;
      border-bottom: 1px solid #eee;
      font-size: .85rem;
    }
    .existing-event .ev-info { color: #333; }
    .existing-event .ev-date { color: #7890a6; font-size: .8rem; }
    .existing-event .ev-creator { color: #aaa; font-size: .72rem; margin-top: 2px; }
    .existing-event .ev-actions { display: flex; flex-direction: column; gap: 4px; }
    .existing-event button {
      background: none;
      border: none;
      color: #c0392b;
      cursor: pointer;
      font-size: .8rem;
      font-weight: 600;
    }
    .existing-event .ev-edit { color: #09366d; }
  </style>
</head>
<body>
  <header>
    <input type="checkbox" id="nav-toggle" />
    <nav>
      <a class="nav-logo" href="index.html"><img src="images/logo_white.svg" alt="עכשיו באות!" /></a>
      <a class="nav-cta" href="index.html#signup">הצטרפו &gt;</a>
      <label class="nav-burger" for="nav-toggle" aria-label="תפריט">
        <span></span><span></span><span></span>
      </label>
      <ul>
        <li><a href="index.html">דף בית</a></li>
        <li><a href="about.html">אודות</a></li>
        <li><a href="candidates.html">בחירות בדמוקרטים!</a></li>
        <li><a href="events.html">יומן אירועים</a></li>
      </ul>
    </nav>
  </header>

  <!-- Login -->
  <div id="login-screen">
    <div class="login-box">
      <h2>הוספת אירוע</h2>
      <p style="color:#666; margin-bottom:1rem; font-size:.9rem">כניסת מנהלים</p>
      <button id="login-btn">כניסה עם Google</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <!-- Admin panel -->
  <div id="admin-panel">
    <div class="top-bar">
      <h1>הוספת אירוע</h1>
      <div style="display:flex; align-items:center; gap:8px">
        <span id="userEmail" style="font-size:.75rem; opacity:.7"></span>
        <button id="logout-btn">יציאה</button>
      </div>
    </div>

    <div class="form-card" style="margin-top:1.5rem">
      <h2>אירוע חדש</h2>

      <div class="field">
        <label>תאריך *</label>
        <input type="date" id="evDate" required />
      </div>

      <div class="field">
        <label>שעה *</label>
        <input type="time" id="evTime" required />
      </div>

      <div class="field">
        <label>אזור *</label>
        <div class="region-radios" id="evRegion">
          <label class="region-radio"><input type="checkbox" name="region" value="צפון" /> צפון</label>
          <label class="region-radio"><input type="checkbox" name="region" value="חיפה" /> חיפה</label>
          <label class="region-radio"><input type="checkbox" name="region" value="מרכז" /> מרכז</label>
          <label class="region-radio"><input type="checkbox" name="region" value="תל אביב" /> תל אביב</label>
          <label class="region-radio"><input type="checkbox" name="region" value="ירושלים" /> ירושלים</label>
          <label class="region-radio"><input type="checkbox" name="region" value="דרום" /> דרום</label>
          <label class="region-radio"><input type="checkbox" name="region" value="וירטואלי" /> וירטואלי</label>
        </div>
      </div>

      <div class="field">
        <label>עיר/ישוב *</label>
        <input type="text" id="evCity" placeholder="חיפה" />
      </div>

      <div class="field">
        <label>כתובת / שם מקום</label>
        <input type="text" id="evAddress" placeholder="בני אפרים 32 | מרכז קהילתי" />
        <div class="hint">לא חובה</div>
      </div>

      <div class="field">
        <label>משתתפים *</label>
        <div class="participants-dropdown" id="participantsDropdown">
          <button type="button" class="pd-toggle" id="pdToggle">בחרו משתתפים ▾</button>
          <div class="pd-menu" id="pdMenu" style="display:none">
            <input type="text" class="pd-search" id="pdSearch" placeholder="חיפוש שם..." autocomplete="off" />
            <div class="pd-list" id="pdList">
              <!-- populated from candidates.json -->
            </div>
            <div class="pd-other">
              <div class="add-row">
                <input type="text" id="otherParticipant" placeholder="שם נוסף..." />
                <button type="button" id="addOther">הוסף</button>
              </div>
            </div>
          </div>
        </div>
        <div class="participants-list" id="participantsList"></div>
      </div>

      <div class="field">
        <label>תאור</label>
        <textarea id="evDesc" maxlength="150" placeholder="כמה מילים על האירוע"></textarea>
        <div class="hint">עד 150 תווים</div>
      </div>

      <div class="field">
        <label>לינק לרישום</label>
        <input type="url" id="evLink" placeholder="https://..." dir="ltr" />
        <div class="hint">השאירו ריק אם אין צורך ברישום</div>
      </div>

      <div class="btn-row">
        <button class="submit-btn" id="submitBtn">הוסף אירוע</button>
        <button class="cancel-btn" id="cancelBtn" style="display:none" type="button">ביטול</button>
      </div>
    </div>

    <!-- Existing events -->
    <div class="form-card">
      <h2>אירועים קיימים</h2>
      <div class="existing-events" id="existingEvents">
        <p style="color:#999">טוען…</p>
      </div>
    </div>
  </div>

  <footer>
    <a href="index.html" aria-label="עכשיו באות! — לדף הבית">
      <img class="footer-logo" src="images/logo_blue.svg" alt="עכשיו באות!" />
    </a>
    כל הזכויות שמורות לעכשיו באות! 2026
  </footer>

  <div class="toast" id="toast">האירוע נוסף בהצלחה!</div>

  <script>
  const firebaseConfig = {
    apiKey:            "AIzaSyC7hQs04G8U0BMs9UXrHEurQnxgxN7jmLw",
    authDomain:        "hagush-org-il.firebaseapp.com",
    projectId:         "hagush-org-il",
    storageBucket:     "hagush-org-il.firebasestorage.app",
    messagingSenderId: "674306617225",
    appId:             "1:674306617225:web:7f84e8f09bc35222e77b58",
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db   = firebase.firestore();

  // ── Auth ──
  const loginScreen = document.getElementById("login-screen");
  const adminPanel  = document.getElementById("admin-panel");

  document.getElementById("login-btn").addEventListener("click", async () => {
    document.getElementById("login-error").textContent = "";
    try {
      await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    } catch (err) {
      document.getElementById("login-error").textContent = err.code + ": " + err.message;
    }
  });

  document.getElementById("logout-btn").addEventListener("click", () => auth.signOut());

  // ── Load candidates for participant dropdown ──
  let candidateNames = [];

  async function loadCandidateNames() {
    try {
      const resp = await fetch("candidates.json");
      const data = await resp.json();
      candidateNames = data.map(c => c.name).sort();

      // Move preferred candidate to top if set
      if (preferredCandidate && candidateNames.includes(preferredCandidate)) {
        candidateNames = [
          preferredCandidate,
          ...candidateNames.filter(n => n !== preferredCandidate)
        ];
      }

      const pdList = document.getElementById("pdList");
      pdList.innerHTML = candidateNames.map(name =>
        `<label class="pd-item${name === preferredCandidate ? ' pd-preferred' : ''}"><span>${esc(name)}</span><input type="checkbox" value="${esc(name)}" onchange="syncParticipants()" /></label>`
      ).join("");
    } catch (e) {
      console.error("Failed to load candidates.json:", e);
    }
  }

  // ── Participants ──
  let otherParticipants = []; // free-text additions

  // Toggle dropdown
  document.getElementById("pdToggle").addEventListener("click", () => {
    const menu = document.getElementById("pdMenu");
    const isOpen = menu.style.display !== "none";
    menu.style.display = isOpen ? "none" : "block";
    if (!isOpen) {
      const search = document.getElementById("pdSearch");
      search.value = "";
      search.focus();
      // Show all items
      document.querySelectorAll("#pdList .pd-item").forEach(item => item.style.display = "");
    }
  });

  // Type-ahead search
  document.getElementById("pdSearch").addEventListener("input", (e) => {
    const query = e.target.value.trim();
    document.querySelectorAll("#pdList .pd-item").forEach(item => {
      const name = item.textContent.trim();
      item.style.display = !query || name.includes(query) ? "" : "none";
    });
  });

  // Close dropdown on outside click
  document.addEventListener("click", (e) => {
    if (!e.target.closest(".participants-dropdown")) {
      document.getElementById("pdMenu").style.display = "none";
    }
  });

  // Add "other" participant
  document.getElementById("addOther").addEventListener("click", addOtherParticipant);
  document.getElementById("otherParticipant").addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); addOtherParticipant(); }
  });

  function addOtherParticipant() {
    const input = document.getElementById("otherParticipant");
    const name = input.value.trim();
    if (!name || otherParticipants.includes(name)) return;
    otherParticipants.push(name);
    input.value = "";
    renderParticipants();
  }

  function removeOther(idx) {
    otherParticipants.splice(idx, 1);
    renderParticipants();
  }

  // Sync checkbox selections + others into the tag display
  window.syncParticipants = function() { renderParticipants(); };

  function getSelectedCandidates() {
    return [...document.querySelectorAll("#pdList input:checked")].map(cb => cb.value);
  }

  function getAllParticipants() {
    return [...getSelectedCandidates(), ...otherParticipants];
  }

  function renderParticipants() {
    const all = getAllParticipants();
    const list = document.getElementById("participantsList");
    const toggle = document.getElementById("pdToggle");

    toggle.textContent = all.length > 0
      ? `${all.length} משתתפים נבחרו ▾`
      : "בחרו משתתפים ▾";

    const candidateTags = getSelectedCandidates().map(name =>
      `<span class="participant-tag">${esc(name)}<button onclick="uncheckCandidate('${esc(name)}')">✕</button></span>`
    );
    const otherTags = otherParticipants.map((name, i) =>
      `<span class="participant-tag">${esc(name)}<button onclick="removeOther(${i})">✕</button></span>`
    );

    list.innerHTML = candidateTags.join("") + otherTags.join("");
  }

  window.uncheckCandidate = function(name) {
    const cb = document.querySelector(`#pdList input[value="${name}"]`);
    if (cb) cb.checked = false;
    renderParticipants();
  };

  // ── Region (checkboxes, returns array) ──
  function getRegion() {
    return [...document.querySelectorAll('input[name="region"]:checked')].map(cb => cb.value);
  }

  function setRegion(value) {
    // value can be a string (legacy) or array
    const values = Array.isArray(value) ? value : [value];
    document.querySelectorAll('input[name="region"]').forEach(cb => {
      cb.checked = values.includes(cb.value);
    });
  }

  function clearRegion() {
    document.querySelectorAll('input[name="region"]').forEach(cb => cb.checked = false);
  }

  // ── Submit ──
  document.getElementById("submitBtn").addEventListener("click", async () => {
    const date = document.getElementById("evDate").value;
    const time = document.getElementById("evTime").value;
    const region = getRegion();
    const city = document.getElementById("evCity").value.trim();
    const participants = getAllParticipants();

    if (!date || !time || region.length === 0 || !city || participants.length === 0) {
      const missing = [];
      if (!date) missing.push("תאריך");
      if (!time) missing.push("שעה");
      if (region.length === 0) missing.push("אזור");
      if (!city) missing.push("עיר/ישוב");
      if (participants.length === 0) missing.push("משתתפים");
      alert("נא למלא: " + missing.join(", "));
      return;
    }

    const btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.textContent = "שומר…";

    try {
      const eventData = {
        date:              date,
        time:              time,
        region:            region,
        city:              city,
        address:           document.getElementById("evAddress").value.trim(),
        participants:      participants,
        description:       document.getElementById("evDesc").value.trim(),
        registration_link: document.getElementById("evLink").value.trim(),
      };

      if (editingId) {
        // Update existing
        await db.collection("campaign_events").doc(editingId).update(eventData);
        editingId = null;
      } else {
        // Create new — event + owner as separate docs sharing same ID
        const docRef = db.collection("campaign_events").doc();
        await docRef.set(eventData);
        await db.collection("campaign_event_owner").doc(docRef.id).set({
          email: auth.currentUser.email,
          created_at: firebase.firestore.FieldValue.serverTimestamp(),
        });
      }

      // Reset form
      document.getElementById("evDate").value = "";
      document.getElementById("evTime").value = "";
      clearRegion();
      document.getElementById("evCity").value = "";
      document.getElementById("evAddress").value = "";
      document.getElementById("evDesc").value = "";
      document.getElementById("evLink").value = "";
      document.querySelectorAll("#pdList input").forEach(cb => cb.checked = false);
      otherParticipants = [];
      renderParticipants();

      // Toast
      const toast = document.getElementById("toast");
      toast.style.display = "block";
      setTimeout(() => toast.style.display = "none", 3000);

      loadExisting();
    } catch (err) {
      alert("שגיאה בשמירה: " + err.message);
    }

    btn.disabled = false;
    btn.textContent = "הוסף אירוע";
    document.getElementById("cancelBtn").style.display = "none";
    editingId = null;
  });

  // ── Load existing events ──
  let currentUserEmail = null;
  let isUserAdmin = false;
  let preferredCandidate = null;

  auth.onAuthStateChanged(async (user) => {
    currentUserEmail = user ? user.email : null;
    isUserAdmin = false;
    preferredCandidate = null;
    if (user) {
      try {
        const roleDoc = await db.collection("roles").doc(user.email).get();
        if (roleDoc.exists && roleDoc.data().active) {
          if (roleDoc.data().role === "admin") isUserAdmin = true;
          if (roleDoc.data().preferred_candidate) preferredCandidate = roleDoc.data().preferred_candidate;
        }
      } catch (e) { /* no role doc */ }
      loginScreen.style.display = "none";
      adminPanel.style.display  = "block";
      document.getElementById("userEmail").textContent = user.email;
      loadCandidateNames();
      loadExisting();
    } else {
      loginScreen.style.display = "flex";
      adminPanel.style.display  = "none";
    }
  });

  async function loadExisting() {
    const snap = await db.collection("campaign_events")
      .orderBy("date")
      .get();

    const wrap = document.getElementById("existingEvents");
    if (snap.empty) {
      wrap.innerHTML = '<p style="color:#999">אין אירועים</p>';
      return;
    }

    // Load ownership info
    let ownerMap = {}; // eventId → email
    try {
      if (isUserAdmin) {
        // Admins can read all owners
        const ownerSnap = await db.collection("campaign_event_owner").get();
        ownerSnap.docs.forEach(d => {
          ownerMap[d.id] = d.data().email;
        });
      } else {
        // Non-admins can only query their own
        const ownerSnap = await db.collection("campaign_event_owner")
          .where("email", "==", currentUserEmail)
          .get();
        ownerSnap.docs.forEach(d => ownerMap[d.id] = d.data().email);
      }
    } catch (e) {
      console.error("Failed to load owners:", e.message);
    }

    // Debug: log event IDs vs owner IDs
    const eventIds = snap.docs.map(d => d.id);
    const missing = eventIds.filter(id => !ownerMap[id]);
    if (missing.length) console.warn("Events without owners:", missing);

    wrap.innerHTML = snap.docs.map(doc => {
      const ev = doc.data();
      const names = (ev.participants || []).join(", ");
      const ownerEmail = ownerMap[doc.id] || "";
      const isOwner = ownerEmail === currentUserEmail;
      const canEdit = isOwner || isUserAdmin;

      return `
        <div class="existing-event">
          <div>
            <div class="ev-info">${esc(names)}</div>
            <div class="ev-date">${esc(ev.date)} ${esc(ev.time)} — ${esc(ev.city || "")}</div>
            <div class="ev-creator">${isUserAdmin && ownerEmail ? 'נוסף ע״י ' + esc(ownerEmail) : ''}</div>
          </div>
          <div class="ev-actions">
            ${canEdit ? `<button class="ev-edit" onclick="editEvent('${doc.id}')">ערוך</button>` : ""}
            ${canEdit ? `<button onclick="deleteEvent('${doc.id}')">מחק</button>` : ""}
          </div>
        </div>
      `;
    }).join("");
  }

  // ── Edit event — load into form ──
  let editingId = null;

  async function editEvent(id) {
    const doc = await db.collection("campaign_events").doc(id).get();
    if (!doc.exists) return;
    const ev = doc.data();

    document.getElementById("evDate").value = ev.date || "";
    document.getElementById("evTime").value = ev.time || "";
    setRegion(ev.region || "");
    document.getElementById("evCity").value = ev.city || "";
    document.getElementById("evAddress").value = ev.address || "";
    document.getElementById("evDesc").value = ev.description || "";
    document.getElementById("evLink").value = ev.registration_link || "";

    // Restore participants: check known candidates, add rest as "others"
    document.querySelectorAll("#pdList input").forEach(cb => cb.checked = false);
    otherParticipants = [];
    const eventParticipants = ev.participants || [];
    for (const name of eventParticipants) {
      const cb = document.querySelector(`#pdList input[value="${name}"]`);
      if (cb) {
        cb.checked = true;
      } else {
        otherParticipants.push(name);
      }
    }
    renderParticipants();

    editingId = id;
    document.getElementById("submitBtn").textContent = "עדכן אירוע";
    document.getElementById("cancelBtn").style.display = "block";
    document.querySelector(".form-card").scrollIntoView({ behavior: "smooth" });
  }

  document.getElementById("cancelBtn").addEventListener("click", () => {
    editingId = null;
    document.getElementById("evDate").value = "";
    document.getElementById("evTime").value = "";
    document.getElementById("evRegion").value = "";
    document.getElementById("evCity").value = "";
    document.getElementById("evAddress").value = "";
    document.getElementById("evDesc").value = "";
    document.getElementById("evLink").value = "";
    participants = [];
    renderParticipants();
    document.getElementById("submitBtn").textContent = "הוסף אירוע";
    document.getElementById("cancelBtn").style.display = "none";
  });

  async function deleteEvent(id) {
    if (!confirm("למחוק את האירוע?")) return;
    await db.collection("campaign_events").doc(id).delete();
    try { await db.collection("campaign_event_owner").doc(id).delete(); } catch (e) { /* may not exist or no permission */ }
    loadExisting();
  }

  function esc(s) {
    const d = document.createElement("div");
    d.textContent = s || "";
    return d.innerHTML;
  }
  </script>
</body>
</html>
