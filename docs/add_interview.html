<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ניהול ראיונות | עכשיו באות!</title>
  <link rel="icon" href="favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Open Sans', sans-serif; background: #f5f6fa; color: #1a1a2e; min-height: 100vh; }

    .top-bar { background: #09366d; color: #fff; padding: .8rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
    .top-bar h1 { font-size: 1.1rem; font-weight: 800; }
    .top-bar .top-right { display: flex; align-items: center; gap: 8px; }
    .top-bar .user-email { font-size: .75rem; opacity: .7; }
    .top-bar button { background: rgba(255,255,255,.15); color: #fff; border: none; border-radius: 6px; padding: .4rem 1rem; font: inherit; font-size: .85rem; cursor: pointer; }

    #login-screen { display: flex; align-items: center; justify-content: center; min-height: 80vh; }
    .login-box { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,.08); padding: 2.5rem 2rem; text-align: center; max-width: 360px; width: 100%; }
    .login-box h2 { color: #09366d; margin-bottom: 1rem; }
    .login-box button { padding: .7rem 1.5rem; background: #09366d; color: #fff; border: none; border-radius: 8px; font: inherit; font-weight: 700; cursor: pointer; }
    .login-error { color: #c0392b; font-size: .8rem; margin-top: .75rem; word-break: break-word; }

    #admin-panel { display: none; max-width: 600px; margin: 1.5rem auto; padding: 0 1rem; }
    .form-card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.06); padding: 1.5rem; margin-bottom: 1.5rem; }
    .form-card h2 { font-size: 1.1rem; font-weight: 700; color: #09366d; margin-bottom: 1rem; }

    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: .85rem; font-weight: 600; color: #333; margin-bottom: .3rem; }
    .field input, .field select { width: 100%; padding: .55rem .75rem; border: 1.5px solid #dde; border-radius: 8px; font: inherit; font-size: .9rem; }
    .field input:focus, .field select:focus { outline: none; border-color: #09366d; }
    .field .hint { font-size: .75rem; color: #999; margin-top: .2rem; }
    .field input[type="date"], .field input[type="time"] { direction: ltr; text-align: right; }

    .btn-row { display: flex; gap: 8px; }
    .submit-btn { flex: 6; padding: .75rem; background: #e47f09; color: #fff; border: none; border-radius: 8px; font: inherit; font-size: 1rem; font-weight: 700; cursor: pointer; }
    .submit-btn:hover { filter: brightness(1.08); }
    .submit-btn:disabled { background: #999; cursor: default; }
    .cancel-btn { flex: 4; padding: .75rem 1.5rem; background: #e0e3e8; border: none; border-radius: 8px; font: inherit; font-size: .9rem; color: #444; cursor: pointer; font-weight: 600; display: none; }

    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #27ae60; color: #fff; padding: .6rem 1.5rem; border-radius: 8px; font-weight: 600; display: none; z-index: 99; }

    .iv-list { margin-top: .5rem; }
    .iv-item { display: flex; justify-content: space-between; align-items: center; padding: .6rem 0; border-bottom: 1px solid #eee; font-size: .85rem; }
    .iv-item:last-child { border-bottom: none; }
    .iv-info { color: #333; }
    .iv-meta { color: #7890a6; font-size: .8rem; }
    .iv-badge { display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: .7rem; font-weight: 600; margin-inline-start: 6px; }
    .iv-upcoming { background: #d4edda; color: #155724; }
    .iv-past { background: #e0e3e8; color: #555; }
    .iv-actions { display: flex; gap: 8px; }
    .iv-actions button { background: none; border: none; cursor: pointer; font-size: .8rem; font-weight: 600; }
    .iv-actions .iv-edit { color: #09366d; }
    .iv-actions .iv-delete { color: #c0392b; }

    /* ── Parsing UI ── */
    .upload-zone { border: 2px dashed #ccd; border-radius: 10px; padding: 2rem; text-align: center; cursor: pointer; transition: border-color .15s, background .15s; }
    .upload-zone:hover, .upload-zone.drag-over { border-color: #09366d; background: #edf1f9; }
    .upload-zone input[type="file"] { display: none; }
    .upload-zone p { color: #666; font-size: .9rem; margin-top: .3rem; }
    .upload-zone .upload-icon { font-size: 2rem; }

    .detect-card { background: #f8f9fc; border: 1.5px solid #dde; border-radius: 10px; padding: 1rem; margin-bottom: .8rem; }
    .detect-card.already-parsed { border-color: #27ae60; }
    .detect-card.skipped { opacity: .35; }
    .detect-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: .6rem; flex-wrap: wrap; gap: 4px; }
    .detect-header .detect-date { font-weight: 700; color: #09366d; }
    .detect-badges { display: flex; gap: 6px; flex-wrap: wrap; }

    .detect-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: .6rem; }
    .detect-fields label { font-size: .75rem; font-weight: 600; color: #555; display: block; margin-bottom: 2px; }
    .detect-fields input, .detect-fields select { width: 100%; padding: .4rem .6rem; border: 1.5px solid #dde; border-radius: 6px; font: inherit; font-size: .8rem; }
    .detect-fields .hint { font-size: .7rem; color: #999; margin-top: .15rem; }
    .detect-btn-row { display: flex; gap: 6px; }
    .detect-btn { padding: .4rem 1rem; border: none; border-radius: 6px; font: inherit; font-size: .8rem; font-weight: 600; cursor: pointer; }
    .detect-parse { background: #09366d; color: #fff; }
    .detect-skip { background: #e0e3e8; color: #444; }

    /* ── Editor ── */
    .editor-wrap { margin-top: 1rem; }
    .qa-block { background: #fff; border: 1.5px solid #dde; border-radius: 10px; margin-bottom: .8rem; overflow: hidden; }
    .qa-block-header { display: flex; justify-content: space-between; align-items: center; padding: .6rem .8rem; background: #f5f7fb; cursor: pointer; }
    .qa-block-header .qa-num { font-weight: 800; color: #e47f09; margin-inline-end: 6px; }
    .qa-block-header .qa-preview { flex: 1; font-size: .8rem; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .qa-block-header .qa-del { background: none; border: none; color: #c0392b; cursor: pointer; font-size: .8rem; font-weight: 600; }
    .qa-header-btns { display: flex; gap: 6px; align-items: center; }
    .qa-merge { background: none; border: 1px solid #09366d; color: #09366d; border-radius: 4px; cursor: pointer; font-size: .7rem; font-weight: 600; padding: 2px 6px; }
    .qa-block-body { display: none; padding: .8rem; border-top: 1px solid #eee; }
    .qa-block.open .qa-block-body { display: block; }
    .qa-section-label { font-size: .7rem; font-weight: 700; text-transform: uppercase; color: #7890a6; margin: .6rem 0 .3rem; }
    .qa-section-label:first-child { margin-top: 0; }
    .qa-msg { display: flex; gap: 6px; align-items: flex-start; margin-bottom: 4px; position: relative; }
    .qa-msg textarea { flex: 1; border: 1px solid #e0e3e8; border-radius: 6px; padding: .4rem; font: inherit; font-size: .8rem; resize: vertical; min-height: 2.2em; line-height: 1.5; }
    .qa-msg .qa-msg-del { background: none; border: none; color: #c0392b; cursor: pointer; font-size: .7rem; padding: 4px; }
    .qa-msg .qa-msg-split { background: none; border: 1px solid #e47f09; color: #e47f09; border-radius: 4px; cursor: pointer; font-size: .8rem; padding: 1px 5px; }
    .qa-msg-interviewer { padding-top: 14px; }
    .qa-msg-interviewer textarea { border-color: #7890a6; background: #f9fafb; font-style: italic; }
    .qa-msg-interviewer::before { content: "מראיינ.ת"; font-size: .6rem; color: #7890a6; font-weight: 600; position: absolute; top: 0; right: 0; }
    .qa-msg-img { max-width: 120px; border-radius: 8px; margin: 4px 0; }
    .qa-section-label .qa-add-msg { font-size: .7rem; color: #09366d; cursor: pointer; background: none; border: none; font-weight: 600; margin-inline-start: 8px; }

    .editor-actions { display: flex; gap: 8px; margin-top: 1rem; }
    .editor-actions button { padding: .6rem 1.2rem; border: none; border-radius: 8px; font: inherit; font-weight: 700; cursor: pointer; }
    .btn-draft { background: #e0e3e8; color: #333; }
    .btn-publish { background: #27ae60; color: #fff; }
    .btn-publish:hover { filter: brightness(1.08); }

    .status-badge { display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: .7rem; font-weight: 600; }
    .status-draft { background: #ffeeba; color: #856404; }
    .status-published { background: #d4edda; color: #155724; }
    .status-skipped { background: #e0e3e8; color: #666; }
  </style>
</head>
<body>

  <div id="login-screen">
    <div class="login-box">
      <h2>ניהול ראיונות</h2>
      <p style="color:#666; margin-bottom:1rem; font-size:.9rem">כניסת מנהלים</p>
      <button id="login-btn">כניסה עם Google</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <div id="admin-panel">
    <div class="top-bar">
      <h1>ניהול ראיונות</h1>
      <div class="top-right">
        <span class="user-email" id="userEmail"></span>
        <button id="logout-btn">יציאה</button>
      </div>
    </div>

    <div class="form-card" style="margin-top:1.5rem">
      <h2 id="formTitle">ראיון חדש</h2>

      <div class="field">
        <label>מועמד.ת *</label>
        <select id="ivCandidate">
          <option value="">— בחרו מועמד.ת —</option>
        </select>
      </div>

      <div class="field">
        <label>תאריך *</label>
        <input type="date" id="ivDate" required />
      </div>

      <div class="field">
        <label>שעה *</label>
        <input type="time" id="ivTime" required />
      </div>

      <div class="btn-row">
        <button class="submit-btn" id="submitBtn">הוסף ראיון</button>
        <button class="cancel-btn" id="cancelBtn" type="button">ביטול</button>
      </div>
    </div>

    <div class="form-card">
      <h2>ראיונות</h2>
      <div class="iv-list" id="ivList"><p style="color:#999">טוען…</p></div>
    </div>

    <!-- ── Parse WhatsApp interview ── -->
    <div class="form-card">
      <h2>ניתוח ראיון מוואטסאפ</h2>
      <div class="upload-zone" id="uploadZone">
        <div class="upload-icon">📁</div>
        <p>גרור קובץ ZIP של צ׳אט וואטסאפ לכאן, או לחץ לבחירה</p>
        <input type="file" id="zipInput" accept=".zip" />
      </div>
      <div id="detectStatus" style="margin-top:.8rem; font-size:.85rem; color:#666; display:none"></div>
    </div>

    <div class="form-card" id="detectResults" style="display:none">
      <h2>ראיונות שזוהו</h2>
      <div id="detectList"></div>
    </div>

    <div class="form-card" id="editorCard" style="display:none">
      <h2 id="editorTitle">עריכת ראיון</h2>
      <div class="editor-wrap" id="editorWrap"></div>
      <div class="editor-actions">
        <button class="btn-publish" id="btnPublish">ייצוא ZIP ופרסום</button>
      </div>
    </div>

  </div>

  <div class="toast" id="toast">נשמר בהצלחה!</div>

  <script>
  const firebaseConfig = {
    apiKey:            "AIzaSyC7hQs04G8U0BMs9UXrHEurQnxgxN7jmLw",
    authDomain:        "hagush-org-il.firebaseapp.com",
    projectId:         "hagush-org-il",
    storageBucket:     "hagush-org-il.firebasestorage.app",
    messagingSenderId: "674306617225",
    appId:             "1:674306617225:web:7f84e8f09bc35222e77b58",
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db   = firebase.firestore();

  // ── Load candidates.json ──
  let candidates = [];

  function lastNameKey(name) {
    const parts = name.replace(/^(ד״ר|ד"ר|רב)\s+/, "").trim().split(/\s+/);
    return parts.length > 1 ? parts[1] : parts[0];
  }

  async function loadCandidates() {
    try {
      const res = await fetch("candidates.json");
      candidates = await res.json();
      candidates.sort((a, b) => lastNameKey(a.name).localeCompare(lastNameKey(b.name), "he"));
      const sel = document.getElementById("ivCandidate");
      candidates.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c.id;
        opt.textContent = c.name;
        sel.appendChild(opt);
      });
    } catch (err) {
      console.error("Failed to load candidates:", err);
    }
  }
  loadCandidates();

  // ── Auth ──
  document.getElementById("login-btn").addEventListener("click", async () => {
    document.getElementById("login-error").textContent = "";
    try {
      await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    } catch (err) {
      document.getElementById("login-error").textContent = err.code + ": " + err.message;
    }
  });
  document.getElementById("logout-btn").addEventListener("click", () => auth.signOut());

  auth.onAuthStateChanged((user) => {
    if (user) {
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("admin-panel").style.display = "block";
      document.getElementById("userEmail").textContent = user.email;
      loadInterviews();
      loadParsingPrefs();
      loadSkipped();
    } else {
      document.getElementById("login-screen").style.display = "flex";
      document.getElementById("admin-panel").style.display = "none";
    }
  });

  // ── Day label helper ──
  const HEB_DAYS = ["ראשון", "שני", "שלישי", "רביעי", "חמישי", "שישי", "שבת"];
  function autoDayLabel(dateStr) {
    const d = new Date(dateStr + "T00:00:00");
    const day = d.getDate();
    const month = d.getMonth() + 1;
    return `${HEB_DAYS[d.getDay()]}, ${day}.${month}`;
  }

  // ── Submit ──
  let editingId = null;

  document.getElementById("submitBtn").addEventListener("click", async () => {
    const candidateId = document.getElementById("ivCandidate").value;
    const date = document.getElementById("ivDate").value;
    const time = document.getElementById("ivTime").value;

    if (!candidateId || !date || !time) {
      alert("נא לבחור מועמד.ת, תאריך ושעה");
      return;
    }

    const candidate = candidates.find(c => c.id === candidateId);

    const dayLabel = autoDayLabel(date);

    const btn = document.getElementById("submitBtn");
    btn.disabled = true;

    const data = {
      candidate_id:    candidateId,
      candidate_name:  candidate ? candidate.name : candidateId,
      date:            date,
      time:            time,
      day_label:       dayLabel,
    };

    try {
      if (editingId) {
        await db.collection("interviews").doc(editingId).update(data);
      } else {
        data.created_at = firebase.firestore.FieldValue.serverTimestamp();
        data.created_by = auth.currentUser.email;
        await db.collection("interviews").add(data);
      }
      resetForm();
      showToast();
      loadInterviews();
    } catch (err) {
      alert("שגיאה: " + err.message);
    }
    btn.disabled = false;
  });

  // ── Cancel ──
  document.getElementById("cancelBtn").addEventListener("click", resetForm);

  function resetForm() {
    editingId = null;
    document.getElementById("ivCandidate").value = "";
    document.getElementById("ivDate").value = "";
    document.getElementById("ivTime").value = "";
    document.getElementById("submitBtn").textContent = "הוסף ראיון";
    document.getElementById("cancelBtn").style.display = "none";
    document.getElementById("formTitle").textContent = "ראיון חדש";
  }

  function showToast() {
    const t = document.getElementById("toast");
    t.style.display = "block";
    setTimeout(() => t.style.display = "none", 3000);
  }

  // ── Load interviews ──
  async function loadInterviews() {
    const snap = await db.collection("interviews").orderBy("date").get();
    const wrap = document.getElementById("ivList");
    const today = new Date().toISOString().slice(0, 10);

    if (snap.empty) {
      wrap.innerHTML = '<p style="color:#999">אין ראיונות</p>';
      return;
    }

    wrap.innerHTML = snap.docs.map(doc => {
      const iv = doc.data();
      const c = candidates.find(x => x.id === iv.candidate_id);
      const displayName = c ? c.name : (iv.candidate_name || iv.candidate_id || "?");
      const isUpcoming = iv.date >= today;
      const badge = isUpcoming
        ? '<span class="iv-badge iv-upcoming">קרוב</span>'
        : '<span class="iv-badge iv-past">עבר</span>';
      return `
        <div class="iv-item">
          <div>
            <div class="iv-info">${esc(displayName)} ${badge}</div>
            <div class="iv-meta">${esc(iv.day_label || iv.date)} ${esc(iv.time)} ${iv.created_by ? '— ' + esc(iv.created_by) : ''}</div>
          </div>
          <div class="iv-actions">
            <button class="iv-edit" onclick="editInterview('${doc.id}')">ערוך</button>
            <button class="iv-delete" onclick="deleteInterview('${doc.id}')">מחק</button>
          </div>
        </div>
      `;
    }).join("");
  }

  async function editInterview(id) {
    const doc = await db.collection("interviews").doc(id).get();
    if (!doc.exists) return;
    const iv = doc.data();

    document.getElementById("ivCandidate").value = iv.candidate_id || "";
    document.getElementById("ivDate").value = iv.date || "";
    document.getElementById("ivTime").value = iv.time || "";

    editingId = id;
    document.getElementById("submitBtn").textContent = "עדכן ראיון";
    document.getElementById("cancelBtn").style.display = "block";
    document.getElementById("formTitle").textContent = "עריכת ראיון";
    document.querySelector(".form-card").scrollIntoView({ behavior: "smooth" });
  }

  async function deleteInterview(id) {
    if (!confirm("למחוק את הראיון?")) return;
    await db.collection("interviews").doc(id).delete();
    loadInterviews();
  }

  function esc(s) {
    const d = document.createElement("div");
    d.textContent = s || "";
    return d.innerHTML;
  }

  // ── Parsing preferences ──
  const PREFS_DOC = "parsing_config/defaults";
  const INTERVIEWS_DIR = "interviews/";
  let parsingPrefs = {
    interviewer_aliases: ["Lyat", "liat", "ליאת"],
    candidate_name_map: {},
  };
  let skippedInterviews = []; // [{sender, date}] — loaded from _skipped.json

  async function loadParsingPrefs() {
    try {
      const doc = await db.doc(PREFS_DOC).get();
      if (doc.exists) { Object.assign(parsingPrefs, doc.data()); console.log("Loaded parsing prefs:", parsingPrefs); }
      else console.log("No parsing prefs doc yet");
    } catch (err) { console.error("loadParsingPrefs failed:", err); }
  }

  async function saveParsingPrefs() {
    try {
      await db.doc(PREFS_DOC).set(parsingPrefs, { merge: true });
      console.log("Saved parsing prefs");
    } catch (err) { console.error("saveParsingPrefs failed:", err); }
  }

  async function loadSkipped() {
    try {
      const res = await fetch(INTERVIEWS_DIR + "_skipped.json");
      if (res.ok) { skippedInterviews = await res.json(); console.log("Loaded skipped:", skippedInterviews.length); }
    } catch { console.log("No _skipped.json found"); }
  }

  function downloadSkipped() {
    const blob = new Blob([JSON.stringify(skippedInterviews, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "_skipped.json";
    a.click();
    URL.revokeObjectURL(a.href);
  }

  // Check which candidate IDs already have interview JSONs
  const existingInterviews = new Set();
  async function checkExistingInterviews(candidateIds) {
    const checks = candidateIds.map(async id => {
      if (existingInterviews.has(id)) return;
      try {
        const res = await fetch(INTERVIEWS_DIR + id + ".json", { method: "HEAD" });
        if (res.ok) existingInterviews.add(id);
      } catch {}
    });
    await Promise.all(checks);
    console.log("Existing interviews:", [...existingInterviews]);
  }

  // ── WhatsApp parser ──────────────────────────────────────────────
  const MSG_RE = /^\[(\d{1,2}\/\d{1,2}\/\d{2,4}),\s*(\d{1,2}:\d{2}:\d{2})\]\s+(.+?):\s(.*)$/;
  const SYSTEM_MARKERS = ["end-to-end encrypted","created group","added you","You're now an admin",
    "changed the group","changed this group","reset this group","turned on disappearing",
    "turned off disappearing","You changed the group","This message was deleted",
    "changed the settings"," left"," removed "," joined using","You added"];
  const ATTACH_RE = /<attached:\s*(.+?)>/;

  function stripInvisible(s) { return s.replace(/[\u200e\u200f\u200b\u200c\u200d\ufeff]/g, ""); }

  function parseMessages(text) {
    const lines = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n");
    const msgs = [];
    for (const rawLine of lines) {
      const line = stripInvisible(rawLine).replace(/^\s+/, "");
      const m = MSG_RE.exec(line);
      if (m) {
        const [, date, time, sender, body] = m;
        const cleanSender = stripInvisible(sender).trim();
        const cleanBody = stripInvisible(body).trim();
        const att = ATTACH_RE.exec(cleanBody);
        if (att) {
          msgs.push({ date, time, sender: cleanSender, text: "", image: att[1] });
        } else if (!cleanBody.includes("image omitted")) {
          msgs.push({ date, time, sender: cleanSender, text: cleanBody, image: "" });
        }
      } else if (msgs.length) {
        msgs[msgs.length - 1].text += "\n" + rawLine;
      }
    }
    return msgs;
  }

  function isSystem(text) {
    const c = stripInvisible(text);
    return SYSTEM_MARKERS.some(m => c.includes(m));
  }

  function timeToMin(t) { const p = t.split(":"); return +p[0] * 60 + +p[1]; }

  // ── Interview detector ──────────────────────────────────────────
  function detectInterviews(msgs) {
    const senderDates = {};
    const dateMsgs = {};
    for (const m of msgs) {
      if (isSystem(m.text) && !m.image) continue;
      if (!senderDates[m.sender]) senderDates[m.sender] = new Set();
      senderDates[m.sender].add(m.date);
      if (!dateMsgs[m.date]) dateMsgs[m.date] = [];
      dateMsgs[m.date].push(m);
    }

    const regulars = new Set();
    const guests = {};

    for (const [sender, dates] of Object.entries(senderDates)) {
      if (sender.startsWith("+")) continue;
      // Skip known interviewer aliases
      const isKnownInterviewer = parsingPrefs.interviewer_aliases.some(
        a => sender.toLowerCase().includes(a.toLowerCase())
      );
      if (dates.size >= 3 || isKnownInterviewer) { regulars.add(sender); continue; }
      let count = 0;
      for (const m of msgs) {
        if (m.sender === sender && (m.text.length > 10 || m.image)) count++;
      }
      if (count >= 3) {
        for (const d of dates) {
          if (!guests[d]) guests[d] = [];
          guests[d].push({ sender, count });
        }
      }
    }

    const detected = [];
    for (const [date, guestList] of Object.entries(guests)) {
      const dayMsgs = dateMsgs[date] || [];
      for (const guest of guestList) {
        const guestMsgs = dayMsgs.filter(m => m.sender === guest.sender);
        if (guestMsgs.length < 3) continue;

        const regularCounts = {};
        for (const m of dayMsgs) {
          if (regulars.has(m.sender)) regularCounts[m.sender] = (regularCounts[m.sender] || 0) + 1;
        }

        // Find interviewer: prefer known aliases, fall back to most active regular
        let bestRegular = "", bestCount = 0;
        // First: check if any known alias matches a regular on this day
        for (const alias of parsingPrefs.interviewer_aliases) {
          for (const r of Object.keys(regularCounts)) {
            if (r.toLowerCase().includes(alias.toLowerCase()) && regularCounts[r] > bestCount) {
              bestRegular = r;
              bestCount = regularCounts[r];
            }
          }
        }
        // Fall back: most active regular if no alias matched
        if (!bestRegular) {
          for (const [r, c] of Object.entries(regularCounts)) {
            if (c > bestCount) { bestRegular = r; bestCount = c; }
          }
        }

        const startTime = guestMsgs[0].time.slice(0, 5);
        const endTime = guestMsgs[guestMsgs.length - 1].time.slice(0, 5);
        const candidateGuess = fuzzyMatchCandidate(guest.sender);

        const [month, day, year] = date.split("/");
        const isoDate = `20${year}-${month.padStart(2, "0")}-${day.padStart(2, "0")}`;

        const isSkipped = skippedInterviews.some(
          s => s.sender === guest.sender && s.date === date
        );

        detected.push({
          date, isoDate, guestSender: guest.sender,
          guestMsgCount: guestMsgs.length, interviewer: bestRegular,
          startTime, endTime, candidateGuess,
          isSkipped,
        });
      }
    }

    detected.sort((a, b) => b.isoDate.localeCompare(a.isoDate));
    return detected;
  }

  // ── Fuzzy match ──
  function fuzzyMatchCandidate(displayName) {
    const dn = displayName.toLowerCase().trim();
    for (const [alias, id] of Object.entries(parsingPrefs.candidate_name_map)) {
      if (dn.includes(alias.toLowerCase()) || alias.toLowerCase().includes(dn)) {
        const c = candidates.find(x => x.id === id);
        if (c) return c;
      }
    }
    const dnTokens = dn.split(/\s+/);
    let best = null, bestScore = 0;
    for (const c of candidates) {
      const nameTokens = c.name.toLowerCase().split(/\s+/);
      let score = 0;
      for (const t of dnTokens) {
        for (const nt of nameTokens) {
          if (t.length > 2 && nt.includes(t)) score += 2;
          else if (nt.length > 2 && t.includes(nt)) score += 2;
        }
      }
      if (score > bestScore) { bestScore = score; best = c; }
    }
    return bestScore >= 2 ? best : null;
  }

  // ── Extract Q/A blocks ──
  const Q_MIN_LEN = 50;

  function extractQA(allMsgs, interviewer, candidate, startTime, endTime, filterDate) {
    const norm = s => s.toLowerCase().replace(/\s+/g, " ").trim();
    const isIv = m => norm(m.sender).includes(norm(interviewer));
    const isCd = m => norm(m.sender).includes(norm(candidate));

    console.log("extractQA:", { interviewer, candidate, startTime, endTime, filterDate });

    const filtered = [];
    let started = false;
    for (const m of allMsgs) {
      if (isSystem(m.text) && !m.image) continue;
      if (!isIv(m) && !isCd(m)) continue;
      if (filterDate && m.date !== filterDate) continue;
      const mins = timeToMin(m.time);
      if (mins < timeToMin(startTime) || mins > timeToMin(endTime)) continue;
      if (!started) {
        if (isIv(m) && m.text.length > 30) started = true; else continue;
      }
      filtered.push(m);
    }

    const ivCount = filtered.filter(m => isIv(m)).length;
    const cdCount = filtered.filter(m => isCd(m)).length;
    console.log(`  Filtered: ${filtered.length} msgs (${ivCount} interviewer, ${cdCount} candidate)`);

    const blocks = [];
    let qParts = [], aParts = [], rParts = [];
    let state = "Q";

    function msgItem(m) {
      if (m.image) {
        if (/\.(mp4|webm|mov)$/i.test(m.image)) return { type: "video", file: m.image };
        if (/\.(opus|ogg|mp3|m4a|aac)$/i.test(m.image)) return { type: "audio", file: m.image };
        return { type: "image", file: m.image };
      }
      return m.text.trim();
    }

    function flush() {
      if (qParts.length && aParts.length) {
        blocks.push({ question: [...qParts], answer: [...aParts], response: [...rParts] });
      }
      qParts = []; aParts = []; rParts = [];
    }

    for (const m of filtered) {
      const item = msgItem(m);
      if (isIv(m)) {
        const isLong = m.text.length >= Q_MIN_LEN;
        if (state === "Q") { qParts.push(item); }
        else if (state === "A") {
          if (isLong) { flush(); qParts.push(item); state = "Q"; }
          else { rParts.push(item); state = "R"; }
        } else {
          if (isLong) { flush(); qParts.push(item); state = "Q"; }
          else { rParts.push(item); }
        }
      } else if (isCd(m)) {
        if (state === "Q") { aParts.push(item); state = "A"; }
        else if (state === "A") { aParts.push(item); }
        else { aParts.push(...rParts); rParts = []; aParts.push(item); state = "A"; }
      }
    }
    flush();
    return blocks;
  }

  // ── Upload handling ──────────────────────────────────────────────
  let allParsedMsgs = [];
  let zipImages = {};

  const uploadZone = document.getElementById("uploadZone");
  const zipInput = document.getElementById("zipInput");
  const detectStatus = document.getElementById("detectStatus");

  uploadZone.addEventListener("click", () => zipInput.click());
  uploadZone.addEventListener("dragover", e => { e.preventDefault(); uploadZone.classList.add("drag-over"); });
  uploadZone.addEventListener("dragleave", () => uploadZone.classList.remove("drag-over"));
  uploadZone.addEventListener("drop", e => { e.preventDefault(); uploadZone.classList.remove("drag-over"); handleZip(e.dataTransfer.files[0]); });
  zipInput.addEventListener("change", () => { if (zipInput.files[0]) handleZip(zipInput.files[0]); });

  async function handleZip(file) {
    detectStatus.style.display = "block";
    detectStatus.textContent = "פותח ZIP…";
    try {
      const zip = await JSZip.loadAsync(file);
      let chatText = "";
      zipImages = {};
      for (const [path, entry] of Object.entries(zip.files)) {
        if (entry.dir) continue;
        const name = path.split("/").pop();
        if (name === "_chat.txt" || name.endsWith("_chat.txt") || (name.endsWith(".txt") && !chatText)) {
          chatText = await entry.async("string");
        } else if (/\.(jpg|jpeg|png|webp|gif)$/i.test(name)) {
          zipImages[name] = await entry.async("blob");
        } else if (/\.(mp4|webm|mov)$/i.test(name)) {
          zipImages[name] = await entry.async("blob");
        } else if (/\.(opus|ogg|mp3|m4a|aac)$/i.test(name)) {
          zipImages[name] = await entry.async("blob");
        }
      }
      if (!chatText) { detectStatus.textContent = "לא נמצא קובץ _chat.txt ב-ZIP"; return; }
      detectStatus.textContent = "מנתח הודעות…";
      allParsedMsgs = parseMessages(chatText);
      detectStatus.textContent = `${allParsedMsgs.length} הודעות. מזהה ראיונות…`;
      const detected = detectInterviews(allParsedMsgs);

      // Check which candidates already have published interviews
      const guessedIds = detected.map(d => d.candidateGuess?.id).filter(Boolean);
      await checkExistingInterviews(guessedIds);
      for (const d of detected) {
        if (d.candidateGuess && existingInterviews.has(d.candidateGuess.id)) {
          d.alreadyParsed = true;
        }
      }

      detectStatus.textContent = `${detected.length} ראיונות זוהו`;
      renderDetected(detected);
    } catch (err) {
      detectStatus.textContent = "שגיאה: " + err.message;
    }
  }

  // ── Render detected interviews ──
  function renderDetected(interviews) {
    const wrap = document.getElementById("detectList");
    document.getElementById("detectResults").style.display = interviews.length ? "block" : "none";

    wrap.innerHTML = interviews.map((iv, i) => {
      const extra = iv.alreadyParsed ? " already-parsed" : iv.isSkipped ? " skipped" : "";
      const badges = [];
      if (iv.alreadyParsed) badges.push('<span class="status-badge status-published">כבר נותח</span>');
      if (iv.isSkipped) badges.push('<span class="status-badge status-skipped">לא רלוונטי</span>');

      const guess = iv.candidateGuess;
      const candidateOptions = '<option value="">— בחרו —</option>' + candidates.map(c =>
        `<option value="${esc(c.id)}" ${guess && guess.id === c.id ? "selected" : ""}>${esc(c.name)}</option>`
      ).join("");

      const ivName = iv.interviewer || parsingPrefs.interviewer_aliases[0] || "";
      const aliasHint = parsingPrefs.interviewer_aliases.length
        ? `<div class="hint">מוכרים: ${esc(parsingPrefs.interviewer_aliases.join(", "))}</div>`
        : "";

      const btns = iv.isSkipped
        ? `<button class="detect-btn detect-skip" onclick="unskipDetected(${i})">שחזר</button>`
        : iv.alreadyParsed
        ? `<button class="detect-btn detect-parse" onclick="loadExisting(${i})">ערוך ▸</button>
           <button class="detect-btn detect-skip" onclick="parseDetected(${i})">נתח מחדש</button>`
        : `<button class="detect-btn detect-parse" onclick="parseDetected(${i})">נתח ▸</button>
           <button class="detect-btn detect-skip" onclick="skipDetected(${i})">לא רלוונטי</button>`;

      return `<div class="detect-card${extra}" data-idx="${i}">
        <div class="detect-header">
          <span class="detect-date">${esc(iv.isoDate)}</span>
          <div class="detect-badges">
            <span class="iv-badge iv-past">${esc(iv.guestSender)} (${iv.guestMsgCount})</span>
            <span class="iv-badge iv-upcoming">מראיינ.ת: ${esc(ivName)}</span>
            ${badges.join("")}
          </div>
        </div>
        <div class="detect-fields">
          <div>
            <label>מועמד.ת</label>
            <select class="det-candidate" data-idx="${i}">${candidateOptions}</select>
          </div>
          <div>
            <label>מראיינ.ת</label>
            <input class="det-interviewer" data-idx="${i}" value="${esc(ivName)}" />
            ${aliasHint}
          </div>
          <div>
            <label>התחלה</label>
            <input type="time" class="det-start" data-idx="${i}" value="${esc(iv.startTime)}" dir="ltr" />
          </div>
          <div>
            <label>סיום</label>
            <input type="time" class="det-end" data-idx="${i}" value="${esc(iv.endTime)}" dir="ltr" />
          </div>
        </div>
        <div class="detect-btn-row">${btns}</div>
      </div>`;
    }).join("");

    window._detected = interviews;
  }

  // ── Skip / unskip ──
  function skipDetected(idx) {
    const iv = window._detected[idx];
    skippedInterviews.push({ sender: iv.guestSender, date: iv.date });
    iv.isSkipped = true;
    renderDetected(window._detected);
    downloadSkipped();
  }

  function unskipDetected(idx) {
    const iv = window._detected[idx];
    skippedInterviews = skippedInterviews.filter(
      s => !(s.sender === iv.guestSender && s.date === iv.date)
    );
    iv.isSkipped = false;
    renderDetected(window._detected);
    downloadSkipped();
  }

  // ── Parse a detected interview ──
  let currentEditData = null;
  let currentEditImages = {};

  async function loadExisting(idx) {
    const iv = window._detected[idx];
    const card = document.querySelector(`.detect-card[data-idx="${idx}"]`);
    const candidateId = card.querySelector(".det-candidate").value;
    if (!candidateId) { alert("נא לבחור מועמד.ת"); return; }

    const candidate = candidates.find(c => c.id === candidateId);
    const candidateName = candidate ? candidate.name : candidateId;

    try {
      const res = await fetch(INTERVIEWS_DIR + candidateId + ".json");
      if (!res.ok) { alert("לא נמצא קובץ ראיון"); return; }
      const data = await res.json();

      currentEditData = {
        candidate_id: candidateId,
        candidate_name: candidateName,
        date: data.date || iv.isoDate,
        interviewer: iv.interviewer,
        questions: data.questions,
      };
      currentEditImages = {};

      // Load existing images from disk into blob cache
      for (const q of data.questions) {
        for (const section of ["question", "answer", "response"]) {
          for (const p of q[section]) {
            if (typeof p === "object" && (p.type === "image" || p.type === "video" || p.type === "audio") && p.file) {
              try {
                const imgRes = await fetch(INTERVIEWS_DIR + candidateId + "/" + p.file);
                if (imgRes.ok) { currentEditImages[p.file] = await imgRes.blob(); continue; }
              } catch {}
              if (zipImages[p.file]) currentEditImages[p.file] = zipImages[p.file];
            }
          }
        }
      }

      renderEditor(data.questions, candidateName, currentEditImages, true);
    } catch (err) {
      alert("שגיאה בטעינת ראיון: " + err.message);
    }
  }

  async function parseDetected(idx) {
    const iv = window._detected[idx];
    const card = document.querySelector(`.detect-card[data-idx="${idx}"]`);
    const candidateId = card.querySelector(".det-candidate").value;
    const interviewer = card.querySelector(".det-interviewer").value;
    const startTime = card.querySelector(".det-start").value;
    const endTime = card.querySelector(".det-end").value;

    if (!candidateId || !interviewer) { alert("נא לבחור מועמד.ת ומראיינ.ת"); return; }

    const candidate = candidates.find(c => c.id === candidateId);
    const candidateName = candidate ? candidate.name : candidateId;

    // Save mapping for next time
    parsingPrefs.candidate_name_map[iv.guestSender] = candidateId;
    if (!parsingPrefs.interviewer_aliases.includes(interviewer)) {
      parsingPrefs.interviewer_aliases.push(interviewer);
    }
    saveParsingPrefs();

    const blocks = extractQA(allParsedMsgs, interviewer, iv.guestSender, startTime, endTime, iv.date);
    const questions = blocks.map((b, i) => ({
      id: `q${i + 1}`, question: b.question, answer: b.answer, response: b.response,
    }));

    currentEditData = {
      candidate_id: candidateId, candidate_name: candidateName,
      date: iv.isoDate, interviewer, status: "draft", questions,
    };
    currentEditImages = {};
    for (const b of blocks) {
      for (const part of [...b.question, ...b.answer, ...b.response]) {
        if (typeof part === "object" && (part.type === "image" || part.type === "video" || part.type === "audio") && zipImages[part.file]) {
          currentEditImages[part.file] = zipImages[part.file];
        }
      }
    }
    renderEditor(questions, candidateName, currentEditImages, true);
  }

  // ── Editor ──────────────────────────────────────────────────────
  function renderEditor(questions, name, images, scroll) {
    const editorCard = document.getElementById("editorCard");
    editorCard.style.display = "block";
    document.getElementById("editorTitle").textContent = `עריכת ראיון — ${name}`;
    const wrap = document.getElementById("editorWrap");

    wrap.innerHTML = questions.map((q, qi) => {
      const firstText = (q.question.find(p => typeof p === "string") || "").split("\n")[0];
      if (!q.summary) q.summary = firstText;
      const preview = q.summary.slice(0, 60);

      function renderMsgs(parts, section) {
        return parts.map((p, pi) => {
          if (typeof p === "object" && (p.type === "image" || p.type === "video" || p.type === "audio")) {
            const blob = images[p.file];
            const src = blob ? URL.createObjectURL(blob) : (p.url || "");
            let media;
            if (p.type === "video") {
              media = src ? `<video class="qa-msg-img" src="${src}" muted loop playsinline style="cursor:pointer" onclick="this.paused?this.play():this.pause()"></video>` : `<span style="color:#999">[${esc(p.file || "video")}]</span>`;
            } else if (p.type === "audio") {
              media = src ? `<audio controls src="${src}" style="max-width:200px"></audio>` : `<span style="color:#999">[${esc(p.file || "audio")}]</span>`;
            } else {
              media = src ? `<img class="qa-msg-img" src="${src}" />` : `<span style="color:#999">[${esc(p.file || "image")}]</span>`;
            }
            return `<div class="qa-msg" data-q="${qi}" data-s="${section}" data-i="${pi}">
              ${media}
              <button class="qa-msg-del" onclick="delMsg(${qi},'${section}',${pi})">✕</button>
            </div>`;
          }
          if (typeof p === "object" && p.type === "text") {
            const roleClass = p.role === "interviewer" ? "qa-msg-interviewer" : "";
            const splitBtn = (p.role === "interviewer" && section === "answer")
              ? `<button class="qa-msg-split" onclick="event.stopPropagation();splitBlock(${qi},${pi})" title="פצל כאן לשאלה חדשה">✂</button>`
              : "";
            return `<div class="qa-msg ${roleClass}" data-q="${qi}" data-s="${section}" data-i="${pi}">
              <textarea rows="1" oninput="autoGrow(this);updateMsg(${qi},'${section}',${pi},this.value)">${esc(p.text)}</textarea>
              ${splitBtn}
              <button class="qa-msg-del" onclick="delMsg(${qi},'${section}',${pi})">✕</button>
            </div>`;
          }
          return `<div class="qa-msg" data-q="${qi}" data-s="${section}" data-i="${pi}">
            <textarea rows="1" oninput="autoGrow(this);updateMsg(${qi},'${section}',${pi},this.value)">${esc(p)}</textarea>
            <button class="qa-msg-del" onclick="delMsg(${qi},'${section}',${pi})">✕</button>
          </div>`;
        }).join("");
      }

      const mergeBtn = qi > 0
        ? `<button class="qa-merge" onclick="event.stopPropagation();mergeWithPrev(${qi})" title="מזג בלוק זה עם הקודם">מזג ↑</button>
           <button class="qa-merge" onclick="event.stopPropagation();moveFirstToPrev(${qi})" title="העבר שורה ראשונה לתגובת הבלוק הקודם">שורה ↑</button>`
        : "";

      return `<div class="qa-block open" data-qi="${qi}">
        <div class="qa-block-header" onclick="this.closest('.qa-block').classList.toggle('open')">
          <span><span class="qa-num">ש׳${qi + 1}</span><span class="qa-preview">${esc(preview)}</span></span>
          <span class="qa-header-btns">
            ${mergeBtn}
            <button class="qa-del" onclick="event.stopPropagation();delBlock(${qi})">מחק</button>
          </span>
        </div>
        <div class="qa-block-body">
          <div class="qa-section-label">כותרת לאקורדיון</div>
          <div class="qa-msg">
            <textarea rows="1" oninput="autoGrow(this);updateSummary(${qi},this.value)">${esc(q.summary)}</textarea>
          </div>
          <div class="qa-section-label">שאלה<button class="qa-add-msg" onclick="addMsg(${qi},'question')">+ הודעה</button></div>
          ${renderMsgs(q.question, "question")}
          <div class="qa-section-label">תשובה<button class="qa-add-msg" onclick="addMsg(${qi},'answer')">+ הודעה</button></div>
          ${renderMsgs(q.answer, "answer")}
          <div class="qa-section-label">תגובה<button class="qa-add-msg" onclick="addMsg(${qi},'response')">+ הודעה</button></div>
          ${renderMsgs(q.response, "response")}
        </div>
      </div>`;
    }).join("");

    if (scroll) editorCard.scrollIntoView({ behavior: "smooth" });
    setTimeout(() => wrap.querySelectorAll("textarea").forEach(autoGrow), 50);
  }

  function autoGrow(el) { el.style.height = "auto"; el.style.height = el.scrollHeight + "px"; }

  function updateMsg(qi, section, pi, value) {
    const existing = currentEditData.questions[qi][section][pi];
    if (typeof existing === "object" && existing.type === "text") {
      existing.text = value;
    } else {
      currentEditData.questions[qi][section][pi] = value;
    }
  }

  function updateSummary(qi, value) {
    currentEditData.questions[qi].summary = value;
  }

  function delMsg(qi, section, pi) {
    currentEditData.questions[qi][section].splice(pi, 1);
    renderEditor(currentEditData.questions, currentEditData.candidate_name, currentEditImages);
  }

  function addMsg(qi, section) {
    currentEditData.questions[qi][section].push("");
    renderEditor(currentEditData.questions, currentEditData.candidate_name, currentEditImages);
  }

  function delBlock(qi) {
    if (!confirm("למחוק בלוק שאלה זה?")) return;
    currentEditData.questions.splice(qi, 1);
    currentEditData.questions.forEach((q, i) => q.id = `q${i + 1}`);
    renderEditor(currentEditData.questions, currentEditData.candidate_name, currentEditImages);
  }

  function splitBlock(qi, answerIdx) {
    const curr = currentEditData.questions[qi];
    const splitItem = curr.answer[answerIdx];

    // New block: interviewer message becomes question, rest of answer follows
    const newQText = typeof splitItem === "object" && splitItem.text ? splitItem.text : String(splitItem);
    const newBlock = {
      id: "",
      summary: newQText.split("\n")[0],
      question: [newQText],
      answer: curr.answer.slice(answerIdx + 1),
      response: curr.response,
    };

    // Truncate current block at split point
    curr.answer = curr.answer.slice(0, answerIdx);
    curr.response = [];

    // Insert new block after current
    currentEditData.questions.splice(qi + 1, 0, newBlock);
    currentEditData.questions.forEach((q, i) => q.id = `q${i + 1}`);
    renderEditor(currentEditData.questions, currentEditData.candidate_name, currentEditImages);
  }

  function tagRole(items, role) {
    return items.map(item => {
      if (typeof item === "string") return { type: "text", role, text: item };
      if (typeof item === "object" && !item.role) return { ...item, role };
      return item;
    });
  }

  function mergeWithPrev(qi) {
    if (qi < 1) return;
    const prev = currentEditData.questions[qi - 1];
    const curr = currentEditData.questions[qi];
    // Preserve roles: response + next question are interviewer, answers are candidate
    prev.answer = [
      ...prev.answer,
      ...tagRole(prev.response, "interviewer"),
      ...tagRole(curr.question, "interviewer"),
      ...curr.answer,
    ];
    prev.response = [...curr.response];
    currentEditData.questions.splice(qi, 1);
    currentEditData.questions.forEach((q, i) => q.id = `q${i + 1}`);
    renderEditor(currentEditData.questions, currentEditData.candidate_name, currentEditImages);
  }

  function moveFirstToPrev(qi) {
    if (qi < 1) return;
    const prev = currentEditData.questions[qi - 1];
    const curr = currentEditData.questions[qi];
    if (!curr.question.length) return;
    const first = curr.question.shift();
    prev.response.push(first);

    // If question is now empty, cascade candidate messages up
    if (curr.question.length === 0) {
      // Flush prev.response into prev.answer (tagged as interviewer)
      prev.answer.push(...tagRole(prev.response, "interviewer"));
      prev.response = [];

      // Move candidate items from top of answer until we hit an interviewer item
      while (curr.answer.length) {
        const item = curr.answer[0];
        const isInterviewer = typeof item === "object" && item.role === "interviewer";
        if (isInterviewer) break;
        prev.answer.push(curr.answer.shift());
      }

      if (curr.answer.length) {
        // First remaining item is an interviewer message — becomes the new question
        const newQ = curr.answer.shift();
        const newQText = typeof newQ === "object" && newQ.text ? newQ.text : String(newQ);
        curr.question = [newQText];
        curr.summary = newQText.split("\n")[0];
      } else {
        // Everything consumed — also move response and delete block
        prev.response = [...curr.response];
        currentEditData.questions.splice(qi, 1);
      }

      currentEditData.questions.forEach((q, i) => q.id = `q${i + 1}`);
    } else {
      // Update summary if it was derived from the moved line
      const newFirst = (curr.question.find(p => typeof p === "string") || "").split("\n")[0];
      const movedText = typeof first === "string" ? first.split("\n")[0] : "";
      if (curr.summary === movedText) curr.summary = newFirst;
    }

    renderEditor(currentEditData.questions, currentEditData.candidate_name, currentEditImages);
  }

  // ── Publish as ZIP ──────────────────────────────────────────────
  document.getElementById("btnPublish").addEventListener("click", () => publishZip());

  async function publishZip() {
    if (!currentEditData) { console.warn("publishZip: no currentEditData"); return; }
    const btn = document.getElementById("btnPublish");
    btn.disabled = true;
    btn.textContent = "מייצר ZIP…";

    try {
      const cid = currentEditData.candidate_id;
      const zip = new JSZip();

      // Build clean JSON — keep image refs as {type, file}
      const jsonData = {
        candidate_id: cid,
        candidate_name: currentEditData.candidate_name,
        date: currentEditData.date,
        questions: currentEditData.questions.map((q, i) => ({
          id: `q${i + 1}`,
          summary: q.summary || "",
          question: q.question,
          answer: q.answer,
          response: q.response,
        })),
      };
      zip.file(`${cid}.json`, JSON.stringify(jsonData, null, 2));

      // Add images to subfolder
      let imgCount = 0;
      for (const q of currentEditData.questions) {
        for (const section of ["question", "answer", "response"]) {
          for (const p of q[section]) {
            if (typeof p === "object" && (p.type === "image" || p.type === "video" || p.type === "audio") && p.file && currentEditImages[p.file]) {
              zip.file(`${cid}/${p.file}`, currentEditImages[p.file]);
              imgCount++;
            }
          }
        }
      }
      console.log(`ZIP: ${cid}.json + ${imgCount} images`);

      // Download
      const blob = await zip.generateAsync({ type: "blob" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `interview_${cid}.zip`;
      a.click();
      URL.revokeObjectURL(url);

      showToast();
    } catch (err) {
      console.error("publishZip FAILED:", err);
      alert("שגיאה: " + err.message);
    }
    btn.disabled = false;
    btn.textContent = "ייצוא ZIP ופרסום";
  }
  </script>
</body>
