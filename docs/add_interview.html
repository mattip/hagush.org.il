<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ניהול ראיונות | עכשיו באות!</title>
  <link rel="icon" href="favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Open Sans', sans-serif; background: #f5f6fa; color: #1a1a2e; min-height: 100vh; }

    .top-bar { background: #09366d; color: #fff; padding: .8rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
    .top-bar h1 { font-size: 1.1rem; font-weight: 800; }
    .top-bar .top-right { display: flex; align-items: center; gap: 8px; }
    .top-bar .user-email { font-size: .75rem; opacity: .7; }
    .top-bar button { background: rgba(255,255,255,.15); color: #fff; border: none; border-radius: 6px; padding: .4rem 1rem; font: inherit; font-size: .85rem; cursor: pointer; }

    #login-screen { display: flex; align-items: center; justify-content: center; min-height: 80vh; }
    .login-box { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,.08); padding: 2.5rem 2rem; text-align: center; max-width: 360px; width: 100%; }
    .login-box h2 { color: #09366d; margin-bottom: 1rem; }
    .login-box button { padding: .7rem 1.5rem; background: #09366d; color: #fff; border: none; border-radius: 8px; font: inherit; font-weight: 700; cursor: pointer; }
    .login-error { color: #c0392b; font-size: .8rem; margin-top: .75rem; word-break: break-word; }

    #admin-panel { display: none; max-width: 600px; margin: 1.5rem auto; padding: 0 1rem; }
    .form-card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.06); padding: 1.5rem; margin-bottom: 1.5rem; }
    .form-card h2 { font-size: 1.1rem; font-weight: 700; color: #09366d; margin-bottom: 1rem; }

    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: .85rem; font-weight: 600; color: #333; margin-bottom: .3rem; }
    .field input, .field select { width: 100%; padding: .55rem .75rem; border: 1.5px solid #dde; border-radius: 8px; font: inherit; font-size: .9rem; }
    .field input:focus, .field select:focus { outline: none; border-color: #09366d; }
    .field .hint { font-size: .75rem; color: #999; margin-top: .2rem; }
    .field input[type="date"], .field input[type="time"] { direction: ltr; text-align: right; }

    .btn-row { display: flex; gap: 8px; }
    .submit-btn { flex: 6; padding: .75rem; background: #e47f09; color: #fff; border: none; border-radius: 8px; font: inherit; font-size: 1rem; font-weight: 700; cursor: pointer; }
    .submit-btn:hover { filter: brightness(1.08); }
    .submit-btn:disabled { background: #999; cursor: default; }
    .cancel-btn { flex: 4; padding: .75rem 1.5rem; background: #e0e3e8; border: none; border-radius: 8px; font: inherit; font-size: .9rem; color: #444; cursor: pointer; font-weight: 600; display: none; }

    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #27ae60; color: #fff; padding: .6rem 1.5rem; border-radius: 8px; font-weight: 600; display: none; z-index: 99; }

    .iv-list { margin-top: .5rem; }
    .iv-item { display: flex; justify-content: space-between; align-items: center; padding: .6rem 0; border-bottom: 1px solid #eee; font-size: .85rem; }
    .iv-item:last-child { border-bottom: none; }
    .iv-info { color: #333; }
    .iv-meta { color: #7890a6; font-size: .8rem; }
    .iv-badge { display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: .7rem; font-weight: 600; margin-inline-start: 6px; }
    .iv-upcoming { background: #d4edda; color: #155724; }
    .iv-past { background: #e0e3e8; color: #555; }
    .iv-actions { display: flex; gap: 8px; }
    .iv-actions button { background: none; border: none; cursor: pointer; font-size: .8rem; font-weight: 600; }
    .iv-actions .iv-edit { color: #09366d; }
    .iv-actions .iv-delete { color: #c0392b; }
  </style>
</head>
<body>

  <div id="login-screen">
    <div class="login-box">
      <h2>ניהול ראיונות</h2>
      <p style="color:#666; margin-bottom:1rem; font-size:.9rem">כניסת מנהלים</p>
      <button id="login-btn">כניסה עם Google</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <div id="admin-panel">
    <div class="top-bar">
      <h1>ניהול ראיונות</h1>
      <div class="top-right">
        <span class="user-email" id="userEmail"></span>
        <button id="logout-btn">יציאה</button>
      </div>
    </div>

    <div class="form-card" style="margin-top:1.5rem">
      <h2 id="formTitle">ראיון חדש</h2>

      <div class="field">
        <label>מועמד.ת *</label>
        <select id="ivCandidate">
          <option value="">— בחרו מועמד.ת —</option>
        </select>
      </div>

      <div class="field">
        <label>תאריך *</label>
        <input type="date" id="ivDate" required />
      </div>

      <div class="field">
        <label>שעה *</label>
        <input type="time" id="ivTime" required />
      </div>

      <div class="btn-row">
        <button class="submit-btn" id="submitBtn">הוסף ראיון</button>
        <button class="cancel-btn" id="cancelBtn" type="button">ביטול</button>
      </div>
    </div>

    <div class="form-card">
      <h2>ראיונות</h2>
      <div class="iv-list" id="ivList"><p style="color:#999">טוען…</p></div>
    </div>
  </div>

  <div class="toast" id="toast">נשמר בהצלחה!</div>

  <script>
  const firebaseConfig = {
    apiKey:            "AIzaSyC7hQs04G8U0BMs9UXrHEurQnxgxN7jmLw",
    authDomain:        "hagush-org-il.firebaseapp.com",
    projectId:         "hagush-org-il",
    storageBucket:     "hagush-org-il.firebasestorage.app",
    messagingSenderId: "674306617225",
    appId:             "1:674306617225:web:7f84e8f09bc35222e77b58",
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db   = firebase.firestore();

  // ── Load candidates.json ──
  let candidates = [];

  function lastNameKey(name) {
    const parts = name.replace(/^(ד״ר|ד"ר|רב)\s+/, "").trim().split(/\s+/);
    return parts.length > 1 ? parts[1] : parts[0];
  }

  async function loadCandidates() {
    try {
      const res = await fetch("candidates.json");
      candidates = await res.json();
      candidates.sort((a, b) => lastNameKey(a.name).localeCompare(lastNameKey(b.name), "he"));
      const sel = document.getElementById("ivCandidate");
      candidates.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c.id;
        opt.textContent = c.name;
        sel.appendChild(opt);
      });
    } catch (err) {
      console.error("Failed to load candidates:", err);
    }
  }
  loadCandidates();

  // ── Auth ──
  document.getElementById("login-btn").addEventListener("click", async () => {
    document.getElementById("login-error").textContent = "";
    try {
      await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    } catch (err) {
      document.getElementById("login-error").textContent = err.code + ": " + err.message;
    }
  });
  document.getElementById("logout-btn").addEventListener("click", () => auth.signOut());

  auth.onAuthStateChanged((user) => {
    if (user) {
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("admin-panel").style.display = "block";
      document.getElementById("userEmail").textContent = user.email;
      loadInterviews();
    } else {
      document.getElementById("login-screen").style.display = "flex";
      document.getElementById("admin-panel").style.display = "none";
    }
  });

  // ── Day label helper ──
  const HEB_DAYS = ["ראשון", "שני", "שלישי", "רביעי", "חמישי", "שישי", "שבת"];
  function autoDayLabel(dateStr) {
    const d = new Date(dateStr + "T00:00:00");
    const day = d.getDate();
    const month = d.getMonth() + 1;
    return `${HEB_DAYS[d.getDay()]}, ${day}.${month}`;
  }

  // ── Submit ──
  let editingId = null;

  document.getElementById("submitBtn").addEventListener("click", async () => {
    const candidateId = document.getElementById("ivCandidate").value;
    const date = document.getElementById("ivDate").value;
    const time = document.getElementById("ivTime").value;

    if (!candidateId || !date || !time) {
      alert("נא לבחור מועמד.ת, תאריך ושעה");
      return;
    }

    const candidate = candidates.find(c => c.id === candidateId);

    const dayLabel = autoDayLabel(date);

    const btn = document.getElementById("submitBtn");
    btn.disabled = true;

    const data = {
      candidate_id:    candidateId,
      candidate_name:  candidate ? candidate.name : candidateId,
      date:            date,
      time:            time,
      day_label:       dayLabel,
    };

    try {
      if (editingId) {
        await db.collection("interviews").doc(editingId).update(data);
      } else {
        data.created_at = firebase.firestore.FieldValue.serverTimestamp();
        data.created_by = auth.currentUser.email;
        await db.collection("interviews").add(data);
      }
      resetForm();
      showToast();
      loadInterviews();
    } catch (err) {
      alert("שגיאה: " + err.message);
    }
    btn.disabled = false;
  });

  // ── Cancel ──
  document.getElementById("cancelBtn").addEventListener("click", resetForm);

  function resetForm() {
    editingId = null;
    document.getElementById("ivCandidate").value = "";
    document.getElementById("ivDate").value = "";
    document.getElementById("ivTime").value = "";
    document.getElementById("submitBtn").textContent = "הוסף ראיון";
    document.getElementById("cancelBtn").style.display = "none";
    document.getElementById("formTitle").textContent = "ראיון חדש";
  }

  function showToast() {
    const t = document.getElementById("toast");
    t.style.display = "block";
    setTimeout(() => t.style.display = "none", 3000);
  }

  // ── Load interviews ──
  async function loadInterviews() {
    const snap = await db.collection("interviews").orderBy("date").get();
    const wrap = document.getElementById("ivList");
    const today = new Date().toISOString().slice(0, 10);

    if (snap.empty) {
      wrap.innerHTML = '<p style="color:#999">אין ראיונות</p>';
      return;
    }

    wrap.innerHTML = snap.docs.map(doc => {
      const iv = doc.data();
      const c = candidates.find(x => x.id === iv.candidate_id);
      const displayName = c ? c.name : (iv.candidate_name || iv.candidate_id || "?");
      const isUpcoming = iv.date >= today;
      const badge = isUpcoming
        ? '<span class="iv-badge iv-upcoming">קרוב</span>'
        : '<span class="iv-badge iv-past">עבר</span>';
      return `
        <div class="iv-item">
          <div>
            <div class="iv-info">${esc(displayName)} ${badge}</div>
            <div class="iv-meta">${esc(iv.day_label || iv.date)} ${esc(iv.time)} ${iv.created_by ? '— ' + esc(iv.created_by) : ''}</div>
          </div>
          <div class="iv-actions">
            <button class="iv-edit" onclick="editInterview('${doc.id}')">ערוך</button>
            <button class="iv-delete" onclick="deleteInterview('${doc.id}')">מחק</button>
          </div>
        </div>
      `;
    }).join("");
  }

  async function editInterview(id) {
    const doc = await db.collection("interviews").doc(id).get();
    if (!doc.exists) return;
    const iv = doc.data();

    document.getElementById("ivCandidate").value = iv.candidate_id || "";
    document.getElementById("ivDate").value = iv.date || "";
    document.getElementById("ivTime").value = iv.time || "";

    editingId = id;
    document.getElementById("submitBtn").textContent = "עדכן ראיון";
    document.getElementById("cancelBtn").style.display = "block";
    document.getElementById("formTitle").textContent = "עריכת ראיון";
    document.querySelector(".form-card").scrollIntoView({ behavior: "smooth" });
  }

  async function deleteInterview(id) {
    if (!confirm("למחוק את הראיון?")) return;
    await db.collection("interviews").doc(id).delete();
    loadInterviews();
  }

  function esc(s) {
    const d = document.createElement("div");
    d.textContent = s || "";
    return d.innerHTML;
  }
  </script>
</body>
</html>
