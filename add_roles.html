<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>הוספת הרשאות</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Open Sans', sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
    h1 { margin-bottom: .5rem; }
    textarea { width: 100%; height: 200px; font-family: monospace; font-size: .9rem; padding: .75rem; border: 2px solid #ccc; border-radius: 8px; direction: ltr; }
    button { margin-top: 1rem; padding: .6rem 1.5rem; background: #09366d; color: #fff; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    button:disabled { background: #999; }
    #log { margin-top: 1rem; padding: 1rem; background: #f5f5f5; border-radius: 8px; font-size: .85rem; white-space: pre-wrap; direction: ltr; max-height: 300px; overflow-y: auto; }
    .info { color: #666; font-size: .85rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <h1>הוספת הרשאות</h1>
  <p class="info">התחברו כ-admin, בחרו תפקיד, הדביקו רשימת אימיילים עם מועמד.ת מועדף.ת (tab-separated, אפשר להדביק מ-Google Sheets).</p>
  <button id="login-btn">כניסה עם Google</button>
  <span id="user-status" style="margin-right:8px; font-size:.85rem; color:#666"></span>
  <br><br>
  <label style="font-weight:600; font-size:.9rem;">תפקיד:
    <select id="role-select" style="padding:.3rem .6rem; border-radius:6px; font:inherit; font-size:.85rem;">
      <option value="event_adder">event_adder — הוספת אירועים</option>
      <option value="event_admin">event_admin — ניהול ואישור אירועים</option>
      <option value="ask_admin">ask_admin — ניהול ראיונות</option>
    </select>
  </label>
  <br><br>
  <textarea id="emails" placeholder="one@gmail.com&#9;נמרוד שפר&#10;two@gmail.com&#9;נאווה רוזוליו&#10;three@gmail.com"></textarea>
  <br>
  <button id="run-btn" disabled>צור הרשאות</button>
  <div id="log"></div>

  <script>
  const firebaseConfig = {
    apiKey:            "AIzaSyC7hQs04G8U0BMs9UXrHEurQnxgxN7jmLw",
    authDomain:        "hagush-org-il.firebaseapp.com",
    projectId:         "hagush-org-il",
    storageBucket:     "hagush-org-il.firebasestorage.app",
    messagingSenderId: "674306617225",
    appId:             "1:674306617225:web:7f84e8f09bc35222e77b58",
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db   = firebase.firestore();
  const log  = document.getElementById("log");

  document.getElementById("login-btn").addEventListener("click", () => {
    auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
  });

  auth.onAuthStateChanged((user) => {
    document.getElementById("user-status").textContent = user ? user.email : "";
    document.getElementById("run-btn").disabled = !user;
  });

  document.getElementById("run-btn").addEventListener("click", async () => {
    const raw = document.getElementById("emails").value;
    const rows = raw.split("\n")
      .map(line => {
        const parts = line.split("\t");
        const email = (parts[0] || "").trim().toLowerCase();
        const candidate = (parts[1] || "").trim();
        return { email, candidate };
      })
      .filter(r => r.email && r.email.includes("@"));

    if (!rows.length) { log.textContent = "No valid emails found"; return; }

    log.textContent = `Found ${rows.length} emails. Creating roles...\n`;
    document.getElementById("run-btn").disabled = true;

    const selectedRole = document.getElementById("role-select").value;
    let ok = 0, skip = 0, fail = 0;
    for (const { email, candidate } of rows) {
      try {
        const ref = db.collection("roles").doc(email);
        const existing = await ref.get();
        if (existing.exists) {
          if (candidate && existing.data().preferred_candidate !== candidate) {
            await ref.update({ preferred_candidate: candidate });
            log.textContent += `✏ ${email} — updated preferred: ${candidate}\n`;
            ok++;
          } else {
            log.textContent += `⏭ ${email} — already has role: ${existing.data().role}${existing.data().preferred_candidate ? ' (' + existing.data().preferred_candidate + ')' : ''}\n`;
            skip++;
          }
        } else {
          const roleData = {
            role: selectedRole,
            active: true,
            created_at: firebase.firestore.FieldValue.serverTimestamp(),
          };
          if (candidate) roleData.preferred_candidate = candidate;
          await ref.set(roleData);
          log.textContent += `✓ ${email} — ${selectedRole}${candidate ? ` (${candidate})` : ""}\n`;
          ok++;
        }
      } catch (err) {
        log.textContent += `✗ ${email} — ${err.message}\n`;
        fail++;
      }
      log.scrollTop = log.scrollHeight;
    }

    log.textContent += `\nDone: ${ok} created, ${skip} skipped, ${fail} failed.`;
    document.getElementById("run-btn").disabled = false;
  });
  </script>
</body>
</html>
